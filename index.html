<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Puerto Madero FPS - Prototipo</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#000;font-family:Arial,sans-serif;}
  #canvas-container{position:fixed;top:0;left:0;width:100%;height:100%;}
  #loading{position:fixed;inset:0;background:#0a0e14;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;font-size:16px;}
  #loading .bar{width:280px;height:6px;background:#222;border-radius:3px;margin-top:16px;overflow:hidden;}
  #loading .fill{height:100%;width:0%;background:#3fa9f5;transition:width .3s;}
  #crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:#fff;box-shadow:0 0 4px #000;z-index:10;pointer-events:none;}
  #hud{position:fixed;bottom:16px;left:16px;color:#fff;font-size:13px;z-index:10;text-shadow:0 0 4px #000;pointer-events:none;}
  #hint{position:fixed;top:16px;left:50%;transform:translateX(-50%);color:#fff;background:rgba(0,0,0,.5);padding:8px 14px;border-radius:8px;font-size:13px;z-index:10;text-align:center;}
  .joy{position:fixed;bottom:24px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.25);z-index:20;touch-action:none;display:none;}
  #joyMove{left:24px;}
  #joyLook{right:24px;}
  .joyStick{position:absolute;top:50%;left:50%;width:44px;height:44px;margin:-22px;border-radius:50%;background:rgba(255,255,255,.35);}
  #fireBtn{position:fixed;bottom:150px;right:34px;width:70px;height:70px;border-radius:50%;background:rgba(255,60,60,.5);border:2px solid rgba(255,255,255,.4);z-index:20;display:none;color:#fff;font-size:12px;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div id="loading">
  <div>Cargando Puerto Madero real (OpenStreetMap)...</div>
  <div class="bar"><div class="fill" id="loadFill"></div></div>
  <div id="loadStatus" style="margin-top:8px;font-size:12px;color:#888;"></div>
</div>
<div id="canvas-container"></div>
<div id="crosshair"></div>
<div id="hud">WASD mover · Mouse mirar · Click disparar · Shift correr</div>
<div id="hint">Click en la pantalla para activar el control (desktop)</div>
<div class="joy" id="joyMove"><div class="joyStick" id="joyMoveStick"></div></div>
<div class="joy" id="joyLook"><div class="joyStick" id="joyLookStick"></div></div>
<div id="fireBtn">FUEGO</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
<script>
(function(){
  "use strict";

  // ---------- CONFIG ----------
  const CENTER_LAT = -34.6118;
  const CENTER_LON = -58.3634;
  const BBOX = { s:-34.625, w:-58.375, n:-34.598, e:-58.358 }; // Puerto Madero completo
  const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent) || ('ontouchstart' in window);

  function llToXZ(lat, lon){
    const x = (lon - CENTER_LON) * 111320 * Math.cos(CENTER_LAT * Math.PI/180);
    const z = -(lat - CENTER_LAT) * 110540;
    return {x, z};
  }

  const loadingEl = document.getElementById('loading');
  const loadFill = document.getElementById('loadFill');
  const loadStatus = document.getElementById('loadStatus');
  function setProgress(pct, msg){
    loadFill.style.width = pct + '%';
    if(msg) loadStatus.textContent = msg;
  }

  // ---------- THREE SETUP ----------
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x8fb8d8);
  scene.fog = new THREE.FogExp2(0x9fc4e0, 0.0035);

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 3000);
  camera.position.set(0, 1.7, 0);

  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------- LIGHTING ----------
  const hemi = new THREE.HemisphereLight(0xbfd9ff, 0x3a3a30, 0.9);
  scene.add(hemi);

  const sun = new THREE.DirectionalLight(0xfff2d6, 1.4);
  sun.position.set(180, 260, 120);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left = -400;
  sun.shadow.camera.right = 400;
  sun.shadow.camera.top = 400;
  sun.shadow.camera.bottom = -400;
  sun.shadow.camera.far = 900;
  sun.shadow.bias = -0.0005;
  scene.add(sun);

  // ---------- GROUND (calles / veredas) ----------
  const groundGeo = new THREE.PlaneGeometry(2000, 2000);
  const asphaltTex = makeAsphaltTexture();
  const groundMat = new THREE.MeshStandardMaterial({map: asphaltTex, roughness:0.95, metalness:0.02});
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI/2;
  ground.receiveShadow = true;
  scene.add(ground);

  // ---------- RIO (Dique / Rio de la Plata, al este de Puerto Madero) ----------
  const waterGeo = new THREE.PlaneGeometry(2000, 2000);
  const waterMat = new THREE.MeshStandardMaterial({color:0x1c4f66, roughness:0.15, metalness:0.6, transparent:true, opacity:0.92});
  const water = new THREE.Mesh(waterGeo, waterMat);
  water.rotation.x = -Math.PI/2;
  water.position.set(500, -0.05, 0); // el rio queda al este de los diques
  water.receiveShadow = true;
  scene.add(water);

  // ---------- TEXTURAS PROCEDURALES (canvas, sin depender de CDNs externos) ----------
  function makeWindowTexture(baseColor, litColor, cols, rows){
    const cw = 128, ch = 256;
    const canvas = document.createElement('canvas');
    canvas.width = cw; canvas.height = ch;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = baseColor;
    ctx.fillRect(0,0,cw,ch);
    const padX = cw/cols, padY = ch/rows;
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const lit = Math.random() < 0.18;
        ctx.fillStyle = lit ? litColor : 'rgba(20,30,40,0.75)';
        const x = c*padX + padX*0.15;
        const y = r*padY + padY*0.15;
        const w = padX*0.7, h = padY*0.6;
        ctx.fillRect(x,y,w,h);
      }
    }
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    return tex;
  }

  function makeConcreteTexture(){
    const size = 256;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#cfc9bd';
    ctx.fillRect(0,0,size,size);
    for(let i=0;i<3000;i++){
      const v = 190 + Math.random()*40;
      ctx.fillStyle = `rgba(${v},${v-4},${v-10},0.15)`;
      ctx.fillRect(Math.random()*size, Math.random()*size, 1.5, 1.5);
    }
    ctx.strokeStyle = 'rgba(90,85,75,0.25)';
    for(let y=0;y<size;y+=16){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(size,y); ctx.stroke(); }
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    return tex;
  }

  function makeAsphaltTexture(){
    const size = 512;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#4a4f55';
    ctx.fillRect(0,0,size,size);
    for(let i=0;i<6000;i++){
      const v = 55 + Math.random()*40;
      ctx.fillStyle = `rgba(${v},${v},${v+3},0.4)`;
      ctx.fillRect(Math.random()*size, Math.random()*size, 1, 1);
    }
    // vereda / lineas
    ctx.strokeStyle = 'rgba(220,220,210,0.5)';
    ctx.lineWidth = 3;
    ctx.setLineDash([18,14]);
    ctx.beginPath(); ctx.moveTo(0,size/2); ctx.lineTo(size,size/2); ctx.stroke();
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(80,80);
    return tex;
  }

  const glassWindowTex = makeWindowTexture('#274257', '#ffe9b0', 6, 14);
  const glassMat = new THREE.MeshStandardMaterial({map: glassWindowTex, color:0xbfe0ff, roughness:0.18, metalness:0.65});

  const concreteTex = makeConcreteTexture();
  const concreteMat = new THREE.MeshStandardMaterial({map: concreteTex, roughness:0.9, metalness:0.03});

  const brickWindowTex = makeWindowTexture('#7a4a36', '#ffdca0', 4, 8);
  const brickMat = new THREE.MeshStandardMaterial({map: brickWindowTex, color:0xc98a6a, roughness:0.92, metalness:0.02});

  const buildingMeshes = []; // para raycast de colisión / disparo

  function buildingMaterial(tags){
    const mat = tags.building;
    if(mat === 'apartments' || mat === 'commercial' || mat === 'office' || mat === 'yes') return glassMat.clone();
    if(mat === 'warehouse' || mat === 'industrial') return brickMat.clone();
    return concreteMat.clone();
  }

  function heightFromTags(tags){
    if(tags['height']) { const h = parseFloat(tags['height']); if(!isNaN(h)) return Math.max(h, 6); }
    if(tags['building:levels']) { const l = parseFloat(tags['building:levels']); if(!isNaN(l)) return Math.max(l*3.2, 6); }
    // Puerto Madero tiene muchas torres altas -> default alto y variado
    return 30 + Math.random()*60;
  }

  function addBuildingFromNodes(points, tags){
    if(points.length < 3) return;
    const shape = new THREE.Shape();
    shape.moveTo(points[0].x, points[0].z);
    for(let i=1;i<points.length;i++) shape.lineTo(points[i].x, points[i].z);

    const height = heightFromTags(tags);
    const extrudeSettings = { depth: height, bevelEnabled:false };
    const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
    geo.rotateX(-Math.PI/2);

    // ancho aproximado del footprint, para escalar el repeat de la textura
    let minX=Infinity, maxX=-Infinity, minZ=Infinity, maxZ=-Infinity;
    points.forEach(p => { minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x); minZ=Math.min(minZ,p.z); maxZ=Math.max(maxZ,p.z); });
    const perimeter = 2*((maxX-minX)+(maxZ-minZ));

    const mat = buildingMaterial(tags);
    if(mat.map){
      mat.map = mat.map.clone();
      mat.map.needsUpdate = true;
      mat.map.repeat.set(Math.max(1, Math.round(perimeter/6)), Math.max(1, Math.round(height/6)));
    }

    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    buildingMeshes.push(mesh);
  }

  // ---------- OBELISCO-STYLE LANDMARK: Puente de la Mujer (simplificado) ----------
  function addLandmarks(){
    const pylonGeo = new THREE.CylinderGeometry(1.2, 1.6, 40, 8);
    const pylonMat = new THREE.MeshStandardMaterial({color:0xffffff, roughness:0.3, metalness:0.4});
    const pylon = new THREE.Mesh(pylonGeo, pylonMat);
    pylon.position.set(80, 20, -20);
    pylon.rotation.z = 0.35;
    pylon.castShadow = true;
    scene.add(pylon);
    buildingMeshes.push(pylon);
  }
  addLandmarks();

  // ---------- CARGA OVERPASS API (edificios reales) ----------
  const overpassQuery = `[out:json][timeout:25];(way["building"](${BBOX.s},${BBOX.w},${BBOX.n},${BBOX.e}););out body;>;out skel qt;`;
  const OVERPASS_MIRRORS = [
    'https://overpass-api.de/api/interpreter',
    'https://overpass.kumi.systems/api/interpreter',
    'https://overpass.openstreetmap.ru/api/interpreter'
  ];

  function fetchWithTimeout(url, ms){
    const controller = new AbortController();
    const t = setTimeout(()=> controller.abort(), ms);
    return fetch(url, {signal: controller.signal}).finally(()=> clearTimeout(t));
  }

  function tryMirrors(index){
    if(index >= OVERPASS_MIRRORS.length) return Promise.reject(new Error('todos los mirrors fallaron'));
    const url = OVERPASS_MIRRORS[index] + '?data=' + encodeURIComponent(overpassQuery);
    setProgress(5, `Probando servidor de mapas ${index+1}/${OVERPASS_MIRRORS.length}...`);
    return fetchWithTimeout(url, 14000)
      .then(r => { if(!r.ok) throw new Error('status '+r.status); return r.json(); })
      .catch(err => {
        console.warn('Mirror falló:', OVERPASS_MIRRORS[index], err);
        return tryMirrors(index+1);
      });
  }

  function spawnFallbackCity(){
    // Si Overpass falla (sin red / rate limit), genero una grilla de edificios densos
    // para que el prototipo funcione igual, con proporciones tipo Puerto Madero.
    setProgress(20, 'Sin respuesta de OpenStreetMap, generando ciudad offline...');
    const cells = [];
    for(let gx=-6; gx<=6; gx++){
      for(let gz=-6; gz<=6; gz++){
        if(Math.random() < 0.35) continue;
        cells.push({gx, gz});
      }
    }
    const total = cells.length;
    let i = 0;
    function processBatch(){
      const end = Math.min(i + 8, total);
      for(; i < end; i++){
        const {gx, gz} = cells[i];
        const cx = gx*35 + (Math.random()-0.5)*10;
        const cz = gz*35 + (Math.random()-0.5)*10;
        const w = 14 + Math.random()*10;
        const d = 14 + Math.random()*10;
        const pts = [
          {x:cx-w/2, z:cz-d/2}, {x:cx+w/2, z:cz-d/2},
          {x:cx+w/2, z:cz+d/2}, {x:cx-w/2, z:cz+d/2}
        ];
        addBuildingFromNodes(pts, {building:'yes'});
      }
      const pct = 20 + Math.round((i/total) * 80);
      setProgress(pct, `Generando edificios: ${i}/${total}`);
      if(i < total){
        requestAnimationFrame(processBatch);
      } else {
        setProgress(100, `Modo offline: ${total} edificios generados`);
        finishLoading();
      }
    }
    processBatch();
  }

  function loadOSM(){
    setProgress(3, 'Conectando con OpenStreetMap...');
    tryMirrors(0)
      .then(data => {
        setProgress(30, 'Datos recibidos, procesando...');
        const nodes = {};
        data.elements.forEach(el => { if(el.type === 'node') nodes[el.id] = el; });
        const ways = data.elements.filter(el => el.type === 'way' && el.tags && el.tags.building);
        const total = ways.length;
        if(total === 0) throw new Error('sin edificios en la zona');

        let count = 0;
        const BATCH = 15;

        function processBatch(){
          const end = Math.min(count + BATCH, total);
          for(let i = count; i < end; i++){
            const way = ways[i];
            const pts = way.nodes.map(id => nodes[id]).filter(Boolean).map(n => llToXZ(n.lat, n.lon));
            if(pts.length >= 3) addBuildingFromNodes(pts, way.tags);
          }
          count = end;
          const pct = 30 + Math.round((count/total) * 70);
          setProgress(pct, `Construyendo edificios: ${count}/${total}`);

          if(count < total){
            requestAnimationFrame(processBatch);
          } else {
            setProgress(100, `Listo: ${total} edificios reales cargados`);
            finishLoading();
          }
        }
        processBatch();
      })
      .catch(err => {
        console.warn('Overpass falló, uso modo offline:', err);
        spawnFallbackCity();
      });
  }

  loadOSM();

  // ---------- PLAYER CONTROLLER ----------
  const controls = new THREE.PointerLockControls(camera, document.body);
  scene.add(controls.getObject());
  controls.getObject().position.set(0, 1.7, 60);

  const hintEl = document.getElementById('hint');
  if(!isMobile){
    document.body.addEventListener('click', ()=>{ controls.lock(); });
    controls.addEventListener('lock', ()=> hintEl.style.display = 'none');
    controls.addEventListener('unlock', ()=> hintEl.style.display = 'block');
  } else {
    hintEl.style.display = 'none';
  }

  const move = {forward:false, back:false, left:false, right:false, run:false};
  const velocity = new THREE.Vector3();
  const PLAYER_SPEED = 6;
  const RUN_MULT = 1.8;

  document.addEventListener('keydown', e=>{
    if(e.code==='KeyW') move.forward=true;
    if(e.code==='KeyS') move.back=true;
    if(e.code==='KeyA') move.left=true;
    if(e.code==='KeyD') move.right=true;
    if(e.code==='ShiftLeft') move.run=true;
  });
  document.addEventListener('keyup', e=>{
    if(e.code==='KeyW') move.forward=false;
    if(e.code==='KeyS') move.back=false;
    if(e.code==='KeyA') move.left=false;
    if(e.code==='KeyD') move.right=false;
    if(e.code==='ShiftLeft') move.run=false;
  });

  // ---------- MOBILE TOUCH CONTROLS ----------
  let mobileMove = {x:0, y:0};
  let mobileLook = {x:0, y:0};
  let mobileFiring = false;

  function setupJoystick(zoneId, stickId, onMove, onEnd){
    const zone = document.getElementById(zoneId);
    const stick = document.getElementById(stickId);
    zone.style.display = 'block';
    let active = false, startX=0, startY=0;
    zone.addEventListener('touchstart', e=>{
      active = true;
      const t = e.touches[0];
      startX = t.clientX; startY = t.clientY;
      e.preventDefault();
    }, {passive:false});
    zone.addEventListener('touchmove', e=>{
      if(!active) return;
      const t = e.touches[0];
      let dx = t.clientX - startX, dy = t.clientY - startY;
      const max = 40;
      dx = Math.max(-max, Math.min(max, dx));
      dy = Math.max(-max, Math.min(max, dy));
      stick.style.transform = `translate(${dx}px, ${dy}px)`;
      onMove(dx/max, dy/max);
      e.preventDefault();
    }, {passive:false});
    zone.addEventListener('touchend', e=>{
      active = false;
      stick.style.transform = 'translate(0,0)';
      onEnd();
      e.preventDefault();
    }, {passive:false});
  }

  if(isMobile){
    setupJoystick('joyMove','joyMoveStick', (x,y)=>{ mobileMove.x=x; mobileMove.y=y; }, ()=>{ mobileMove.x=0; mobileMove.y=0; });
    setupJoystick('joyLook','joyLookStick', (x,y)=>{ mobileLook.x=x; mobileLook.y=y; }, ()=>{ mobileLook.x=0; mobileLook.y=0; });
    const fireBtn = document.getElementById('fireBtn');
    fireBtn.style.display = 'flex';
    fireBtn.addEventListener('touchstart', e=>{ mobileFiring = true; shoot(); e.preventDefault(); }, {passive:false});
    fireBtn.addEventListener('touchend', e=>{ mobileFiring = false; e.preventDefault(); }, {passive:false});
  }

  const euler = new THREE.Euler(0,0,0,'YXZ');

  // ---------- WEAPON VIEWMODEL (fusil de verdad, no una caja) ----------
  const gunGroup = new THREE.Group();
  const metalDark = new THREE.MeshStandardMaterial({color:0x1c1c1e, roughness:0.35, metalness:0.85});
  const metalMid  = new THREE.MeshStandardMaterial({color:0x2e2e30, roughness:0.5, metalness:0.7});
  const gripMat   = new THREE.MeshStandardMaterial({color:0x141414, roughness:0.8, metalness:0.1});

  const receiver = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.075, 0.32), metalDark);
  gunGroup.add(receiver);

  const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.014, 0.28, 10), metalMid);
  barrel.rotation.x = Math.PI/2;
  barrel.position.set(0, 0.01, -0.32);
  gunGroup.add(barrel);

  const handguard = new THREE.Mesh(new THREE.BoxGeometry(0.045, 0.045, 0.18), metalMid);
  handguard.position.set(0, 0.005, -0.24);
  gunGroup.add(handguard);

  const stock = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.06, 0.16), gripMat);
  stock.position.set(0, -0.005, 0.22);
  gunGroup.add(stock);

  const pistolGrip = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.09, 0.035), gripMat);
  pistolGrip.position.set(0, -0.06, 0.06);
  pistolGrip.rotation.x = 0.25;
  gunGroup.add(pistolGrip);

  const magazine = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.11, 0.05), metalDark);
  magazine.position.set(0, -0.09, -0.05);
  magazine.rotation.x = -0.15;
  gunGroup.add(magazine);

  const sightBase = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.02, 0.05), metalMid);
  sightBase.position.set(0, 0.05, -0.05);
  gunGroup.add(sightBase);
  const sightRing = new THREE.Mesh(new THREE.TorusGeometry(0.012, 0.003, 6, 12), metalDark);
  sightRing.position.set(0, 0.065, -0.05);
  gunGroup.add(sightRing);

  gunGroup.position.set(0.16, -0.16, -0.35);
  gunGroup.rotation.y = -0.02;
  gunGroup.traverse(function(o){ if(o.isMesh){ o.castShadow = false; o.receiveShadow = false; } });
  camera.add(gunGroup);
  scene.add(camera);

  const gunBody = receiver; // referencia usada por el flash/retroceso al disparar

  const raycaster = new THREE.Raycaster();
  function shoot(){
    raycaster.setFromCamera({x:0,y:0}, camera);
    const hits = raycaster.intersectObjects(buildingMeshes);
    if(navigator.vibrate) navigator.vibrate(30); // feedback hapt. de disparo
    if(hits.length > 0){
      const hit = hits[0];
      spawnImpact(hit.point);
      if(navigator.vibrate) navigator.vibrate([10,30,10]); // feedback de impacto
    }
    // flash del arma
    gunBody.position.z += 0.05;
    setTimeout(()=>{ gunBody.position.z -= 0.05; }, 60);
  }

  function spawnImpact(point){
    const geo = new THREE.SphereGeometry(0.06, 6, 6);
    const mat = new THREE.MeshBasicMaterial({color:0xffcc55});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(point);
    scene.add(mesh);
    setTimeout(()=> scene.remove(mesh), 400);
  }

  document.addEventListener('mousedown', e=>{
    if(e.button === 0 && controls.isLocked) shoot();
  });

  // ---------- LOOP ----------
  const clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.1);

    // mobile look
    if(isMobile && (mobileLook.x !== 0 || mobileLook.y !== 0)){
      euler.setFromQuaternion(camera.quaternion);
      euler.y -= mobileLook.x * dt * 2.2;
      euler.x -= mobileLook.y * dt * 2.2;
      euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, euler.x));
      camera.quaternion.setFromEuler(euler);
    }
    if(isMobile && mobileFiring){
      // auto-fire mientras se mantiene apretado (cada ~250ms) se maneja aparte si hace falta
    }

    const speed = (move.run ? PLAYER_SPEED*RUN_MULT : PLAYER_SPEED);
    let fwd = 0, strafe = 0;
    if(!isMobile){
      fwd = (move.forward?1:0) - (move.back?1:0);
      strafe = (move.right?1:0) - (move.left?1:0);
    } else {
      fwd = -mobileMove.y;
      strafe = mobileMove.x;
    }

    if(fwd !== 0 || strafe !== 0){
      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);
      dir.y = 0; dir.normalize();
      const right = new THREE.Vector3().crossVectors(dir, camera.up).normalize();
      const moveVec = new THREE.Vector3();
      moveVec.addScaledVector(dir, fwd);
      moveVec.addScaledVector(right, strafe);
      if(moveVec.lengthSq() > 0){
        moveVec.normalize().multiplyScalar(speed*dt);
        controls.getObject().position.add(moveVec);
      }
    }
    controls.getObject().position.y = 1.7;

    renderer.render(scene, camera);
  }

  function finishLoading(){
    setTimeout(()=>{ loadingEl.style.opacity='0'; loadingEl.style.transition='opacity .5s'; setTimeout(()=> loadingEl.style.display='none', 500); }, 400);
  }

  animate();
})();
</script>
</body>
</html>
