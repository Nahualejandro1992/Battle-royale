<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>SordoGo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{
    --bg:#0c0c0e;
    --stage-grad-1:#15171c;
    --stage-grad-2:#0c0c0e;
    --surface:#17181c;
    --surface-2:#1e2025;
    --border:#2a2c33;
    --text:#f5f5f2;
    --text-dim:#8b8d94;
    --text-faint:#55575f;
    --accent:#4b7bff;
    --accent-dim:#294277;
    --gold:#d7b56d;
    --gold-dim:#3a3324;
    --success:#3ecf7e;
    --success-dim:#173b28;
    --warning:#e8a33d;
    --warning-dim:#3a2c14;
    --danger:#ef5b6b;
    --danger-dim:#3a1e22;
    --radius-lg:26px;
    --radius-md:16px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);min-height:100%;font-family:'Inter',-apple-system,Segoe UI,Arial,sans-serif;}
  h1,h2,h3,.display{font-family:'Space Grotesk',-apple-system,sans-serif;}

  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}

  /* ===== SPLASH (pantalla de bienvenida al abrir) ===== */
  #splash{position:fixed;inset:0;z-index:2000;background:radial-gradient(circle at 50% 40%, #15171c, #0c0c0e 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:splashOut .5s ease 1.3s forwards;}
  .splashMark{position:relative;width:72px;height:72px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 0 30px rgba(215,181,109,.4);}
  .splashMarkRing{position:absolute;inset:-10px;border-radius:50%;border:2px solid var(--accent);border-top-color:transparent;animation:splashSpin 1.1s linear infinite;}
  @keyframes splashSpin{ to{ transform:rotate(360deg); } }
  .splashLogo{font-family:'Space Grotesk';font-size:38px;font-weight:700;color:var(--text);animation:splashPulse 1.3s ease infinite;}
  .splashLogo .dot{color:var(--accent);}
  .splashTag{font-size:13px;color:var(--text-dim);margin-top:10px;letter-spacing:.5px;opacity:0;animation:fadeIn .5s ease .4s forwards;}
  @keyframes splashPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  @keyframes splashOut{to{opacity:0;visibility:hidden;pointer-events:none;}}

  /* ===== STAGE (zona superior tipo "mapa") ===== */
  .stage{
    background:radial-gradient(circle at 30% 20%, var(--stage-grad-1), var(--stage-grad-2) 70%);
    padding:22px 22px 64px;
    position:relative;
    overflow:hidden;
  }
  .stage::after{
    content:'';
    position:absolute; inset:0;
    background-image:radial-gradient(rgba(255,255,255,.035) 1px, transparent 1px);
    background-size:18px 18px;
    pointer-events:none;
  }
  .topbar{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;}
  .wordmark{font-size:19px;font-weight:700;letter-spacing:.2px;}
  .wordmark .dot{color:var(--accent);}
  .connPill{font-size:10.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;padding:5px 11px;border-radius:20px;border:1px solid var(--border);color:var(--text-dim);background:rgba(255,255,255,.02);}
  .connPill.ok{color:var(--success);border-color:var(--success-dim);}
  .connPill.warn{color:var(--warning);border-color:var(--warning-dim);}

  /* ===== SHEET (hoja inferior tipo Uber) ===== */
  .sheet{
    background:var(--surface);
    border-radius:var(--radius-lg) var(--radius-lg) 0 0;
    margin-top:-40px;
    padding:22px 22px 34px;
    position:relative;
    z-index:2;
    flex:1;
    box-shadow:0 -20px 40px rgba(0,0,0,.35);
  }
  .handle{width:36px;height:4px;border-radius:3px;background:var(--border);margin:0 auto 20px;}

  .backLink{display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:16px;}
  .backLink:active{opacity:.6;}

  h1.title{font-size:23px;font-weight:600;margin:0 0 4px;letter-spacing:-.2px;}
  p.subtitle{color:var(--text-dim);font-size:13.5px;margin:0 0 22px;line-height:1.5;}

  /* ===== FORM ===== */
  label{display:block;font-size:11.5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--text-faint);margin:16px 0 7px;}
  input[type=text], input[type=tel], input[type=number]{
    width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    padding:13px 15px;border-radius:var(--radius-sm);font-size:15px;font-family:inherit;
    transition:border-color .15s;
  }
  input::placeholder{color:var(--text-faint);}
  input:focus{outline:none;border-color:var(--accent);}

  .segmented{display:flex;gap:8px;margin-top:8px;}
  .segOpt{flex:1;text-align:center;padding:11px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-2);color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;}
  .segOpt.active{background:var(--accent-dim);border-color:var(--accent);color:#cfdcff;}

  .depositBox{background:var(--gold-dim);border:1px solid #4a3f22;border-radius:var(--radius-md);padding:16px;margin-top:18px;}
  .depositBox .depositLabel{font-size:11.5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}

  /* ===== ROUTE STRIP (firma visual) ===== */
  .routeStrip{display:flex;gap:14px;margin:4px 0 6px;}
  .routeStrip .rail{display:flex;flex-direction:column;align-items:center;padding-top:5px;}
  .railDotOrigin{width:9px;height:9px;border-radius:50%;border:2px solid var(--accent);background:transparent;}
  .railLine{width:2px;flex:1;min-height:22px;background:repeating-linear-gradient(to bottom, var(--border) 0 4px, transparent 4px 8px);margin:4px 0;}
  .railDotDest{width:9px;height:9px;border-radius:2px;background:var(--gold);}
  .routeLabels{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:1px 0;}
  .routeLabels .rl{font-size:14.5px;font-weight:500;color:var(--text);line-height:1.3;}
  .routeLabels .rl .tag{display:block;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-faint);margin-bottom:2px;}

  /* ===== BUTTONS ===== */
  .btn{display:flex;align-items:center;justify-content:center;width:100%;background:var(--text);color:#0c0c0e;border:none;
    padding:16px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;margin:8px 0;cursor:pointer;font-family:inherit;
    transition:transform .1s;}
  .btn:active{transform:scale(.97);}
  .btn.secondary{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn.accent{background:var(--accent);color:#fff;}
  .btn.success{background:var(--success);color:#062015;}
  .btn.danger{background:transparent;border:1px solid var(--danger-dim);color:var(--danger);}
  .btn:disabled{opacity:.35;}

  .choiceCard{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color .15s;}
  .choiceCard:active{border-color:var(--accent);}
  .choiceGlyph{width:44px;height:44px;border-radius:12px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .choiceText .ct-title{font-size:15.5px;font-weight:600;}
  .choiceText .ct-sub{font-size:12.5px;color:var(--text-dim);margin-top:2px;}

  /* ===== STATUS HERO ===== */
  .statusHero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:6px 0 26px;position:relative;z-index:1;}
  .radar{width:64px;height:64px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
  .radar .ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid var(--accent);opacity:0;animation:radarPulse 2s ease-out infinite;}
  .radar .ring:nth-child(2){animation-delay:.65s;}
  .radar .core{width:14px;height:14px;border-radius:50%;background:var(--accent);box-shadow:0 0 16px var(--accent);}
  @keyframes radarPulse{0%{transform:scale(.4);opacity:.7;}100%{transform:scale(1.6);opacity:0;}}
  .radar.done .core{background:var(--success);box-shadow:0 0 16px var(--success);}
  .radar.done .ring{display:none;}
  .statusHeroTitle{font-size:18px;font-weight:600;letter-spacing:-.1px;}
  .statusHeroSub{font-size:12.5px;color:var(--text-dim);margin-top:4px;}

  /* ===== CARDS ===== */
  .card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px;margin-bottom:12px;}
  .rideCard{position:relative;}
  .rideCard .who{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--accent-dim);color:#cfdcff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
  .who .whoName{font-size:15px;font-weight:600;}
  .who .whoSub{font-size:12px;color:var(--text-dim);}

  .goldBadge{display:inline-flex;align-items:center;gap:6px;background:var(--gold-dim);color:var(--gold);font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;margin-top:12px;}

  .statusPill{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:6px 13px;border-radius:20px;margin-bottom:14px;}
  .statusPill.pendiente{background:var(--warning-dim);color:var(--warning);}
  .statusPill.aceptado{background:var(--accent-dim);color:#8fb0ff;}
  .statusPill.en_curso{background:var(--success-dim);color:var(--success);}
  .statusPill.completado{background:var(--surface);color:var(--text-dim);}
  .dotBlink{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.1s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

  /* ===== AVAILABILITY SWITCH ===== */
  .availCard{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}

  /* ===== BOTONES RÁPIDOS DEL HEADER (conductor) ===== */
  .quickActionsRow{display:flex;gap:8px;padding:14px 4px 0;}
  .quickActionBtn{flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 6px;text-align:center;font-size:11.5px;font-weight:600;color:var(--text-dim);cursor:pointer;}
  .quickActionBtn:active{transform:scale(.96);border-color:var(--accent-dim);}
  .quickActionBtn .qaIcon{display:block;font-size:18px;margin-bottom:4px;}

  /* ===== RESUMEN DEL DÍA (aprovecha el espacio libre bajo el slider) ===== */
  .todayStatsRow{display:flex;gap:8px;margin:14px 0 4px;}
  .todayStat{flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 8px;text-align:center;}
  .todayStatVal{font-size:18px;font-weight:800;font-family:'Space Grotesk';color:var(--text);}
  .todayStatLabel{font-size:10.5px;color:var(--text-faint);margin-top:3px;text-transform:uppercase;letter-spacing:.3px;}
  .availText{display:flex;align-items:center;gap:10px;}
  /* ===== LED animado para los 3 estados del conductor (llamar la atención sin sonido) ===== */
  .ledDot{width:11px;height:11px;border-radius:50%;position:relative;flex-shrink:0;display:inline-block;}
  .ledDot::before, .ledDot::after{content:'';position:absolute;inset:-7px;border-radius:50%;opacity:0;}
  .ledDot::before{animation:ledRing 1.5s ease-out infinite;}
  .ledDot::after{animation:ledRing 1.5s ease-out infinite;animation-delay:.5s;}
  .ledDot{animation:ledBlink 1.5s ease-in-out infinite;}
  @keyframes ledRing{0%{transform:scale(.5);opacity:.9;}100%{transform:scale(2.1);opacity:0;}}
  @keyframes ledBlink{0%,100%{filter:brightness(1) saturate(1);}50%{filter:brightness(1.7) saturate(1.3);}}

  .ledDot.disponible{background:var(--success);box-shadow:0 0 6px var(--success), 0 0 14px var(--success);}
  .ledDot.disponible::before,.ledDot.disponible::after{background:radial-gradient(circle, rgba(62,207,126,.55), transparent 70%);}

  .ledDot.reservado{background:var(--gold);box-shadow:0 0 6px var(--gold), 0 0 14px var(--gold);}
  .ledDot.reservado::before,.ledDot.reservado::after{background:radial-gradient(circle, rgba(215,181,109,.55), transparent 70%);}

  .ledDot.ocupado{background:var(--warning);box-shadow:0 0 6px var(--warning), 0 0 14px var(--warning);}
  .ledDot.ocupado::before,.ledDot.ocupado::after{background:radial-gradient(circle, rgba(232,163,61,.55), transparent 70%);}

  .ledDot.offline{background:var(--text-faint);box-shadow:none;animation:none;}
  .ledDot.offline::before,.ledDot.offline::after{display:none;}

  .statusPill{position:relative;}
  .statusPill .ledDot{margin-right:7px;vertical-align:middle;}
  .availLabel{font-size:15px;font-weight:600;}
  .switchBtn{width:50px;height:29px;border-radius:20px;background:var(--surface);border:1px solid var(--border);position:relative;cursor:pointer;flex-shrink:0;}
  .switchBtn .knob{position:absolute;top:2px;left:2px;width:23px;height:23px;border-radius:50%;background:var(--text-faint);transition:transform .2s, background .2s;}
  .switchBtn.on{background:var(--success-dim);border-color:var(--success);}
  .switchBtn.on .knob{transform:translateX(21px);background:var(--success);}

  /* ===== SLIDER DE CONECTAR / DESCONECTAR (conductor) ===== */
  .connectWrap{margin-bottom:18px;}
  .connectTrack{position:relative;width:100%;height:64px;border-radius:34px;background:var(--surface-2);border:1px solid var(--border);overflow:hidden;user-select:none;touch-action:none;transition:background .25s, border-color .25s;}
  .connectTrack.on{background:var(--success-dim);border-color:var(--success);}
  .connectTrack.off{background:var(--warning-dim);border-color:var(--border);}
  .connectLabel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13.5px;font-weight:700;letter-spacing:.2px;color:var(--text-dim);pointer-events:none;transition:opacity .15s;}
  .connectTrack.on .connectLabel{color:var(--success);}
  .connectThumb{position:absolute;top:4px;left:4px;width:56px;height:56px;border-radius:50%;background:var(--text);color:#0c0c0e;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;cursor:grab;transition:left .18s ease, background .2s;box-shadow:0 2px 10px rgba(0,0,0,.4);touch-action:none;}
  .connectThumb.dragging{transition:none;cursor:grabbing;}
  .connectTrack.on .connectThumb{background:var(--success);color:#062015;left:calc(100% - 60px);}
  .connectTrack.off .connectThumb{left:4px;}

  .empty{text-align:center;color:var(--text-faint);padding:36px 10px;font-size:13.5px;}

  .sectionLabel{font-size:11.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--text-faint);margin:4px 0 12px;}

  .hidden{display:none !important;}
  .fadeIn{animation:fadeIn .25s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  /* ===== MAPA ===== */
  .mapWrap{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border);position:relative;margin-bottom:4px;background:var(--surface-2);}
  .mapPicker{width:100%;height:400px;}
  .mapStatic{width:100%;height:300px;}
  .mapHint{position:absolute;top:10px;left:10px;right:10px;z-index:400;background:rgba(12,12,14,.82);backdrop-filter:blur(4px);color:var(--text);font-size:12px;font-weight:600;padding:9px 13px;border-radius:20px;text-align:center;pointer-events:none;}
  .leaflet-control-attribution{background:rgba(12,12,14,.7) !important;color:var(--text-faint) !important;font-size:9px !important;}
  .leaflet-control-attribution a{color:var(--text-dim) !important;}
  .caba-pin{width:18px;height:18px;border-radius:50%;border:3px solid var(--accent);background:#0c0c0e;box-shadow:0 0 10px rgba(75,123,255,.6);}
  .caba-pin.dest{border-color:var(--gold);box-shadow:0 0 10px rgba(215,181,109,.6);border-radius:5px;}
  .caba-pin.me{width:16px;height:16px;border:3px solid #fff;background:var(--accent);box-shadow:0 0 0 6px rgba(75,123,255,.25);}
  /* tiño el mapa para que combine con la paleta de la app en vez de verse "aparte" */
  .leaflet-tile-pane{filter:invert(93%) hue-rotate(180deg) brightness(0.94) contrast(0.88) saturate(0.7);}

  /* botones chicos tipo ícono flotando sobre el mapa (antes eran píldoras con texto) */
  .mapIconBtn{position:absolute;top:10px;right:10px;z-index:400;width:38px;height:38px;background:rgba(12,12,14,.85);color:var(--accent);font-size:16px;border-radius:50%;border:1px solid var(--accent-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .mapIconBtn:active{transform:scale(.92);}

  .addressSearchRow{display:flex;gap:8px;margin-bottom:8px;}
  .addressSearchRow input{flex:1;}

  .addressSuggestions{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);margin:-4px 0 10px;overflow:hidden;}
  .addressSuggestItem{padding:12px 14px;font-size:13.5px;color:var(--text-dim);border-bottom:1px solid var(--border);cursor:pointer;}
  .addressSuggestItem:last-child{border-bottom:none;}
  .addressSuggestItem:active{background:var(--accent-dim);color:#fff;}
  .iconSearchBtn{width:48px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-dim);font-size:16px;cursor:pointer;flex-shrink:0;}
  .iconSearchBtn:active{transform:scale(.94);}

  .confirmBox{opacity:0;max-height:0;overflow:hidden;transition:opacity .3s, max-height .35s;}
  .confirmBox.show{opacity:1;max-height:1200px;}

  /* ===== FOTOS DE PERFIL / AUTO ===== */
  .photoPickRow{display:flex;align-items:center;gap:14px;margin-top:8px;}
  .photoPreview{width:56px;height:56px;border-radius:14px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0;}
  .photoPreview img{width:100%;height:100%;object-fit:cover;}
  .photoPickBtn{width:auto;flex:1;text-align:center;margin:0;padding:12px;}
  .avatarPhoto{padding:0;overflow:hidden;}

  /* ===== ANILLO ANIMADO ALREDEDOR DEL AVATAR (efecto de atracción) ===== */
  .avatarRing{position:relative;width:130px;height:130px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;}
  .avatarRing::before{
    content:'';position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(from 0deg, var(--accent), var(--gold), var(--success), var(--accent));
    animation:ringSpin 3.5s linear infinite;
  }
  .avatarRing img, .avatarRing .avatar{position:relative;width:120px !important;height:120px !important;border:3px solid var(--surface) !important;z-index:1;}
  @keyframes ringSpin{ 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
  .avatarPhoto img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

  /* ===== BANNER DE PERFIL CON PARTÍCULAS ===== */
  .profileBanner{position:relative;overflow:hidden;padding:36px 20px !important;}
  .profileBanner::before{
    content:'';position:absolute;inset:-40%;
    background:conic-gradient(from 0deg, rgba(75,123,255,.16), rgba(215,181,109,.18), rgba(62,207,126,.1), rgba(75,123,255,.16));
    animation:bannerSwirl 14s linear infinite;
    pointer-events:none;
    filter:blur(30px);
  }
  .particleLayer{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
  .particle{position:absolute;bottom:-10px;border-radius:50%;opacity:0;animation:particleFloat linear infinite;}
  @keyframes bannerSwirl{ 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
  @keyframes particleFloat{
    0%{ transform:translateY(0) translateX(0) scale(1) rotate(0deg); opacity:0; }
    12%{ opacity:1; }
    50%{ transform:translateY(-90px) translateX(calc(var(--drift,12px) * .5)) scale(1.15) rotate(180deg); }
    88%{ opacity:.7; }
    100%{ transform:translateY(-190px) translateX(var(--drift,12px)) scale(.4) rotate(360deg); opacity:0; }
  }
  .profileBanner > *{position:relative;z-index:1;}

  /* ===== AVISO URGENTE (pedido privado) ===== */
  .urgentOverlay{position:fixed;inset:0;background:rgba(8,10,16,.92);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease both;}
  .urgentCard{background:var(--surface);border:2px solid var(--gold);border-radius:var(--radius-lg);padding:26px 22px;max-width:400px;width:100%;text-align:center;box-shadow:0 0 40px rgba(215,181,109,.25);}
  .urgentBadge{display:inline-block;background:var(--gold-dim);color:var(--gold);font-size:11.5px;font-weight:800;letter-spacing:.5px;padding:6px 14px;border-radius:20px;margin-bottom:10px;}
  .urgentTimer{font-size:38px;font-weight:800;color:var(--gold);font-family:'Space Grotesk';margin-bottom:14px;}
  .urgentName{font-size:16px;font-weight:600;margin:8px 0 14px;}

  /* ===== ESTRELLAS DE CALIFICACIÓN ===== */

  /* ===== TARJETA DE VEHÍCULO CON PLACA ANIMADA ===== */

  .chatBubble.mine{align-self:flex-end;background:var(--accent-dim);color:#eaf0ff;border-bottom-right-radius:4px;}
  .chatBubbleTime{font-size:10px;color:var(--text-faint);margin-top:4px;text-align:right;}
  .chatInputRow{display:flex;gap:8px;position:sticky;bottom:0;background:var(--surface);padding-top:8px;}

  .mpAliasCard{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg, #00b1ea22, #009ee322);border:1px solid #00b1ea55;border-radius:var(--radius-md);padding:14px 16px;margin-bottom:12px;}
  .mpLogoBadge{display:inline-flex;align-items:center;gap:5px;background:#fff;border-radius:20px;padding:4px 10px 4px 6px;font-family:'Space Grotesk';font-weight:700;font-size:11.5px;margin-bottom:6px;}
  .mpLogoBadge .mpDot{width:16px;height:16px;border-radius:50%;background:#00b1ea;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;}
  .mpLogoBadge .mpMercado{color:#00b1ea;}
  .mpLogoBadge .mpPago{color:#2d3277;}
  .mpQrWrap{background:#fff;border-radius:12px;padding:6px;flex-shrink:0;}

  /* ===== PATENTE ESTILO CHAPA REAL ===== */
  .plateBadge{display:inline-flex;align-items:center;background:#f2f2ee;color:#0c0c0e;font-family:'Space Grotesk',monospace;font-weight:700;font-size:13px;letter-spacing:1.5px;padding:4px 10px;border-radius:4px;border:2px solid #0c0c0e;box-shadow:0 1px 0 rgba(255,255,255,.4) inset;}
  .plateBadge.mini{font-size:11px;padding:3px 8px;}

  .carMeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .colorDot{width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);flex-shrink:0;}
  .carMetaText{font-size:12.5px;color:var(--text-dim);}

  /* ===== 3 ESTADOS DE CONDUCTOR ===== */
  .statusPill.disponible{background:var(--success-dim);color:var(--success);}
  .statusPill.reservado{background:var(--gold-dim);color:var(--gold);}
  .statusPill.ocupado{background:var(--warning-dim);color:var(--warning);}
  .statusPill.offline{background:var(--surface);color:var(--text-faint);}

  /* ===== DIRECTORIO DE CONDUCTORES ===== */
  .driverListCard{display:flex;gap:14px;align-items:flex-start;}
  .driverListCard .avatar{width:46px;height:46px;font-size:16px;}
  .driverListInfo{flex:1;}
  .driverListName{font-size:15px;font-weight:600;}

  /* ===== MARCADOR DE AUTO EN VIVO ===== */
  .car-pin-wrap{position:relative;width:32px;height:32px;}
  .car-pin-wrap .ring{position:absolute;inset:-9px;border-radius:50%;border:2px solid var(--gold);opacity:0;animation:carPulse 1.6s ease-out infinite;}
  .car-pin-wrap .ring:nth-child(2){animation-delay:.55s;}
  .car-pin-wrap .core{position:absolute;inset:0;border-radius:50%;background:var(--gold);border:3px solid #0c0c0e;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 10px rgba(0,0,0,.5);}
  @keyframes carPulse{0%{transform:scale(.55);opacity:.85;}100%{transform:scale(2);opacity:0;}}
</style>
</head>
<body>
<div id="splash">

    <svg viewBox="0 0 24 24" width="34" height="34" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 16.5V12.8c0-.4.13-.79.38-1.1L6.6 9.3c.28-.35.7-.55 1.15-.55h8.5c.45 0 .87.2 1.15.55l1.72 2.4c.25.31.38.7.38 1.1v3.7" stroke="#0c0c0e" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="16.5" width="18" height="3" rx="1.2" stroke="#0c0c0e" stroke-width="1.6"/><circle cx="7" cy="19.5" r="1.4" fill="#0c0c0e"/><circle cx="17" cy="19.5" r="1.4" fill="#0c0c0e"/><path d="M6.8 12.2h10.4" stroke="#0c0c0e" stroke-width="1.6" stroke-linecap="round"/></svg>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
  "use strict";

  // ================= CONFIG =================
  const SUPABASE_URL = 'https://nmxcnqwuxloziiaxdixv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5teGNucXd1eGxvemlpYXhkaXh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1Mzg1MTMsImV4cCI6MjA5OTExNDUxM30.kL-kSjbXb_NXAKxXBP0Fx0t10T3Lg7Rmihs8yhod0pk';

  let supa = null;
  try {
    if(window.supabase) supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch(e){ console.warn(e); }

  const connBadge = document.getElementById('connBadge');
  const main = document.getElementById('main');
  const stageContent = document.getElementById('stageContent');

  function vibrate(p){ if(navigator.vibrate) navigator.vibrate(p); }
  function money(n){ return '$' + Number(n||0).toLocaleString('es-AR'); }
  function initials(name){
    return String(name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('') || '?';
  }
  function escapeHtml(str){
    return String(str||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // ================= ESTADO DE SESIÓN =================
  // Cargo de servicio de la plataforma: aparte de la seña, va para el mantenimiento de la app.
  // Se puede ajustar acá (monto fijo simple para esta prueba).
  // Cargo de servicio: también varía según distancia (cerca = poco, lejos = más), no un monto fijo.
  const SERVICE_FEE_BASE = 150;
  const SERVICE_FEE_PER_KM = 25;
  function estimateServiceFee(km){
    return Math.round((SERVICE_FEE_BASE + km*SERVICE_FEE_PER_KM)/50)*50;
  }
  const VIP_SURCHARGE_MULTIPLIER = 1.25; // pedido privado a un conductor elegido: 25% más

  // Tarifa fijada en USD (así no se desactualiza con la inflación) y convertida
  // a pesos con la cotización del dólar blue de hoy. Si no se puede consultar,
  // cae a una cotización de referencia fija.
  const FARE_BASE_USD = 1.2;
  const FARE_PER_KM_USD = 0.35;
  const FALLBACK_USD_RATE = 1200; // referencia si falla la consulta en vivo

  let currentUsdRate = null;
  let currentUsdRateLabel = '';

  async function fetchDolarRate(){
    try{
      const res = await fetch('https://dolarapi.com/v1/dolares/blue');
      const data = await res.json();
      if(data && data.venta){
        currentUsdRate = data.venta;
        currentUsdRateLabel = `Dólar blue hoy: $${data.venta}`;
        return currentUsdRate;
      }
    } catch(e){ console.warn('No se pudo obtener cotización, uso valor de referencia:', e); }
    currentUsdRate = FALLBACK_USD_RATE;
    currentUsdRateLabel = `Cotización de referencia: $${FALLBACK_USD_RATE} (sin conexión al dólar en vivo)`;
    return currentUsdRate;
  }

  function distanceKm(lat1, lng1, lat2, lng2){
    const R = 6371;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLng = (lng2-lng1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function estimateFare(km){
    const rate = currentUsdRate || FALLBACK_USD_RATE;
    const usd = FARE_BASE_USD + km*FARE_PER_KM_USD;
    return Math.round((usd * rate)/50)*50;
  }

  // Ruta real por calles (motor de ruteo público OSRM, gratis, sin key).
  // Si falla (sin red, servidor caído), devuelve null y quien lo llama cae a línea recta.
  async function fetchRealRoute(lat1, lng1, lat2, lng2){
    try{
      const url = `https://router.project-osrm.org/route/v1/driving/${lng1},${lat1};${lng2},${lat2}?overview=full&geometries=geojson`;
      const res = await fetch(url);
      const data = await res.json();
      if(data.routes && data.routes[0]){
        const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
        return { coords, km: data.routes[0].distance/1000, minutes: data.routes[0].duration/60 };
      }
    } catch(e){ console.warn('Ruteo real falló, uso línea recta:', e); }
    return null;
  }

  let session = {
    role: null,
    passengerName: '', passengerPhone: '', passengerPhoto: '',
    targetDriver: null, // si el pasajero eligió un conductor específico del directorio
    driverId: null, driverName: '', driverPhone: '',
    driverBrand: '', driverModel: '', driverColor: '', driverPlate: '',
    driverPhoto: '', driverCarPhoto: '', driverMpAlias: '', driverMpQrPhoto: '',
    driverStatus: 'offline',
    activeRideId: null
  };

  let ridesChannel = null;
  let driversChannel = null;
  let directoryChannel = null;
  let geoWatchId = null;
  let lastGeoSend = 0;

  function plateBadge(plate, mini){
    return `<span class="plateBadge${mini?' mini':''}">${escapeHtml(plate||'S/D')}</span>`;
  }

  function previewPhoto(file, previewElId){
    const reader = new FileReader();
    reader.onload = e => {
      const el = document.getElementById(previewElId);
      if(el) el.innerHTML = `<img src="${e.target.result}" alt="">`;
    };
    reader.readAsDataURL(file);
  }

  async function uploadPhoto(file, phone, kind){
    if(!file || !supa) return null;
    try{
      const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
      const path = `${phone.replace(/[^0-9]/g,'')}-${kind}-${Date.now()}.${ext}`;
      const { error } = await supa.storage.from('sordogo-photos').upload(path, file, { upsert:true });
      if(error){ console.warn('No se pudo subir la foto:', error.message); return null; }
      const { data } = supa.storage.from('sordogo-photos').getPublicUrl(path);
      return data?.publicUrl || null;
    } catch(e){ console.warn('Error subiendo foto:', e); return null; }
  }

  // Avatar real (foto) si existe, si no las iniciales de siempre
  function avatarHtml(name, photoUrl, extraStyle){
    if(photoUrl){
      return `<div class="avatar avatarPhoto" style="${extraStyle||''}"><img src="${photoUrl}" alt=""></div>`;
    }
    return `<div class="avatar" style="${extraStyle||''}">${initials(name)}</div>`;
  }

  async function getDriverRatingSummary(driverId){
    if(!supa) return null;
    const { data } = await supa.from('rides').select('rating').eq('driver_id', driverId).not('rating','is',null);
    if(!data || data.length === 0) return null;
    const avg = data.reduce((s,r)=>s+r.rating,0) / data.length;
    return { avg, count: data.length };
  }

  function ratingBadgeHtml(avg, count){
    return `<span style="display:inline-flex;align-items:center;gap:3px;font-size:12px;color:var(--gold);font-weight:600;">★ ${avg.toFixed(1)} <span style="color:var(--text-faint);font-weight:400;">(${count})</span></span>`;
  }

  // ================= HISTORIAL DE VIAJES (como "Actividad" en Uber) =================
  // ================= CHAT DE TEXTO (reemplaza la llamada, mejor para la comunidad sorda) =================
  let chatChannel = null;

  async function renderChatScreen(rideId, myRole, otherName){
    stageContent.innerHTML = `
      <div style="padding:30px 4px 0;">
        <div style="font-size:22px;font-weight:600;">💬 ${escapeHtml(otherName||'Chat')}</div>
        <div style="font-size:13px;color:var(--text-dim);margin-top:6px;">Mensajes de este viaje</div>
      </div>
    `;
    main.innerHTML = `
      <div class="backLink" id="back">← volver</div>
      <div id="chatMessages" class="chatMessages"><div class="empty">Cargando mensajes...</div></div>
      <div class="chatInputRow">
        <input type="text" id="chatInput" placeholder="Escribí tu mensaje...">
        <button class="btn" id="chatSendBtn" style="width:auto;padding:14px 20px;">Enviar</button>
      </div>
    `;
    document.getElementById('back').onclick = () => {
      if(chatChannel){ supa.removeChannel(chatChannel); chatChannel = null; }
      if(myRole === 'pasajero') renderPassengerTracking();
      else renderDriverDashboard();
    };

    await loadChatMessages(rideId);

    if(chatChannel){ supa.removeChannel(chatChannel); chatChannel = null; }
    chatChannel = supa.channel('chat-'+rideId)
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'ride_messages', filter:`ride_id=eq.${rideId}` }, (payload) => {
        appendChatMessage(payload.new, myRole);
        if(payload.new.sender_role !== myRole) vibrate([15,40,15]);
      })
      .subscribe();

    const myName = myRole === 'pasajero' ? session.passengerName : session.driverName;
    async function send(){
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if(!text) return;
      input.value = '';
      await supa.from('ride_messages').insert({
        ride_id: rideId, sender_role: myRole, sender_name: myName, message: text
      });
    }
    document.getElementById('chatSendBtn').onclick = send;
    document.getElementById('chatInput').addEventListener('keydown', e => { if(e.key==='Enter') send(); });
  }

  async function loadChatMessages(rideId){
    const el = document.getElementById('chatMessages');
    if(!el || !supa) return;
    const { data, error } = await supa.from('ride_messages').select('*').eq('ride_id', rideId).order('created_at', {ascending:true});
    if(error){ el.innerHTML = `<div class="empty">No se pudo cargar el chat.</div>`; return; }
    if(!data || data.length === 0){ el.innerHTML = `<div class="empty">Todavía no hay mensajes. Escribí el primero 👋</div>`; return; }
    el.innerHTML = '';
    data.forEach(m => appendChatMessage(m, null, true));
    el.scrollTop = el.scrollHeight;
  }

  function appendChatMessage(msg, myRole, skipScroll){
    const el = document.getElementById('chatMessages');
    if(!el) return;
    if(el.querySelector('.empty')) el.innerHTML = '';
    const mine = myRole ? msg.sender_role === myRole : false;
    const bubble = document.createElement('div');
    bubble.className = 'chatBubble ' + (mine ? 'mine' : 'theirs');
    bubble.innerHTML = `
      <div class="chatBubbleText">${escapeHtml(msg.message)}</div>
      <div class="chatBubbleTime">${new Date(msg.created_at).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</div>
    `;
    el.appendChild(bubble);
    if(!skipScroll) el.scrollTop = el.scrollHeight;
  }

  async function renderTripHistory(role){
    stageContent.innerHTML = `
      <div style="padding:30px 4px 0;">
        <div style="font-size:22px;font-weight:600;">Tus viajes</div>
        <div style="font-size:13px;color:var(--text-dim);margin-top:6px;">Historial y comprobantes</div>
      </div>
    `;
    main.innerHTML = `
      <div class="backLink" id="back">← volver</div>
      <div id="historyList"><div class="empty">Cargando historial...</div></div>
    `;
    document.getElementById('back').onclick = () => {
      if(role === 'pasajero') renderPassengerForm();
      else renderDriverDashboard();
    };

    if(!supa) return;
    const query = role === 'pasajero'
      ? supa.from('rides').select('*').eq('passenger_phone', session.passengerPhone).eq('status','completado').order('created_at', {ascending:false})
      : supa.from('rides').select('*').eq('driver_id', session.driverId).eq('status','completado').order('created_at', {ascending:false});

    const { data, error } = await query;
    const el = document.getElementById('historyList');
    if(!el) return;
    if(error){ el.innerHTML = `<div class="empty">No se pudo cargar el historial.</div>`; return; }
    if(!data || data.length === 0){ el.innerHTML = `<div class="empty">Todavía no tenés viajes completados.</div>`; return; }

    const totalPaid = data.reduce((s,r) => s + (r.deposit_amount||0) + (role==='conductor' ? 0 : (r.service_fee||0)), 0);

    el.innerHTML = `
      <div class="card" style="text-align:center;margin-bottom:16px;">
        <div style="font-size:11px;color:var(--text-faint);text-transform:uppercase;font-weight:700;letter-spacing:.3px;">${role==='conductor' ? 'Viajes realizados' : 'Viajes hechos'}</div>
        <div style="font-size:28px;font-weight:800;margin-top:4px;">${data.length}</div>
      </div>
    ` + data.map(r => {
      const date = new Date(r.created_at).toLocaleString('es-AR', {day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit'});
      const otherName = role === 'pasajero' ? r.driver_name : r.passenger_name;
      const payMethod = r.final_payment_method || r.deposit_method || 'sin especificar';
      return `
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
            <div style="font-size:11.5px;color:var(--text-faint);">${date}</div>
            ${r.rating ? `<span style="font-size:12px;color:var(--gold);font-weight:600;">★ ${r.rating}</span>` : ''}
          </div>
          ${routeStrip(r.pickup, r.dropoff)}
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
            <div style="font-size:12.5px;color:var(--text-dim);">${otherName ? escapeHtml(otherName) : (role==='pasajero' ? 'Sin conductor asignado' : 'Pasajero')} · pagó por ${payMethod}</div>
            <div style="font-size:16px;font-weight:700;">${money(r.estimated_fare || r.deposit_amount)}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  const COLOR_HEX = { 'Blanco':'#f2f2ee','Negro':'#1a1a1a','Gris':'#8a8d94','Plateado':'#c7cad1','Rojo':'#e2495a','Azul':'#4b7bff','Otro':'#d7b56d' };
  function colorDot(colorName){
    const hex = COLOR_HEX[colorName] || '#8a8d94';
    return `<span class="colorDot" style="background:${hex};"></span>`;
  }

  // ================= RECORDAR CUENTA (para no volver a elegir pasajero/conductor cada vez) =================
  function storageSet(key, value){
    try{ localStorage.setItem(key, value); } catch(e){}
    try{ document.cookie = `${key}=${encodeURIComponent(value)};max-age=31536000;path=/`; } catch(e){}
  }
  function storageGet(key){
    try{
      const v = localStorage.getItem(key);
      if(v) return v;
    } catch(e){}
    try{
      const match = document.cookie.match(new RegExp('(?:^|; )'+key+'=([^;]*)'));
      if(match) return decodeURIComponent(match[1]);
    } catch(e){}
    return null;
  }
  function storageRemove(key){
    try{ localStorage.removeItem(key); } catch(e){}
    try{ document.cookie = `${key}=;max-age=0;path=/`; } catch(e){}
  }

  function rememberAccount(role, phone){
    storageSet('sordogo_role', role);
    storageSet('sordogo_phone', phone);
  }
  function getRememberedAccount(){
    const role = storageGet('sordogo_role');
    const phone = storageGet('sordogo_phone');
    if(role && phone) return { role, phone };
    return null;
  }
  function forgetAccount(){
    storageRemove('sordogo_role');
    storageRemove('sordogo_phone');
  }

  // ================= MAPA (Leaflet, limitado a CABA) =================
  // Cobertura: CABA + Gran Buenos Aires (los partidos más cercanos)
  const CABA_BOUNDS = [[-35.10, -58.90], [-34.25, -58.00]]; // SW, NE
  const CABA_CENTER = [-34.6037, -58.3816]; // Obelisco
  // Voyager tiene jerarquía de calles clara (autopistas, avenidas, calles, parques, agua)
  // y lo oscurecemos con un filtro CSS en vez de perder ese detalle con un estilo "dark" plano.
  const DARK_TILES = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
  const TILE_ATTR = '&copy; OpenStreetMap contributors &copy; CARTO';

  function makeBaseMap(containerId, interactive){
    const map = L.map(containerId, {
      center: CABA_CENTER,
      zoom: 11,
      minZoom: 9,
      maxZoom: 17,
      maxBounds: CABA_BOUNDS,
      maxBoundsViscosity: 1.0,
      zoomControl: interactive,
      dragging: interactive,
      scrollWheelZoom: interactive,
      doubleClickZoom: interactive,
      touchZoom: interactive,
      attributionControl: true
    });
    L.tileLayer(DARK_TILES, { attribution: TILE_ATTR, subdomains:'abcd', maxZoom:19 }).addTo(map);
    return map;
  }

  function pinIcon(dest, isGPS){
    const cls = dest ? 'dest' : (isGPS ? 'me' : '');
    return L.divIcon({ className:'', html:`<div class="caba-pin${cls?' '+cls:''}"></div>`, iconSize:[18,18] });
  }

  async function reverseGeocode(lat, lng){
    try{
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=0`);
      const data = await res.json();
      if(data && data.display_name){
        // Recortamos a las primeras 2-3 partes para que no sea un párrafo
        return data.display_name.split(',').slice(0,3).join(',').trim();
      }
    } catch(e){ console.warn('geocode falló', e); }
    return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  }

  // Busca una dirección escrita y la convierte en coordenadas, acotado a CABA
  async function forwardGeocode(query){
    const results = await forwardGeocodeList(query);
    return results && results[0] ? { lat: results[0].lat, lng: results[0].lng } : null;
  }

  // Devuelve varias opciones (para mostrar un listado tipo autocompletar), CABA + Gran Buenos Aires
  async function forwardGeocodeList(query){
    try{
      const viewbox = `${CABA_BOUNDS[0][1]},${CABA_BOUNDS[1][0]},${CABA_BOUNDS[1][1]},${CABA_BOUNDS[0][0]}`;
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ', Buenos Aires, Argentina')}&viewbox=${viewbox}&bounded=1&limit=5&addressdetails=1`;
      const res = await fetch(url);
      const data = await res.json();
      if(data && data.length){
        return data.map(d => ({
          lat: parseFloat(d.lat),
          lng: parseFloat(d.lon),
          label: d.display_name.split(',').slice(0,3).join(',').trim()
        }));
      }
    } catch(e){ console.warn('búsqueda de dirección falló', e); }
    return [];
  }

  function inCaba(lat, lng){
    return lat >= CABA_BOUNDS[0][0] && lat <= CABA_BOUNDS[1][0] && lng >= CABA_BOUNDS[0][1] && lng <= CABA_BOUNDS[1][1];
  }

  // Selector de puntos para pedir un viaje: origen = tu ubicación real (o toque manual), destino = toque
  function initPickerMap(containerId, onUpdate){
    const map = makeBaseMap(containerId, true);
    let originMarker = null, destMarker = null;
    let originPt = null, destPt = null;
    let line = null;

    function redrawLine(){
      if(line){ map.removeLayer(line); line = null; }
      if(originPt && destPt){
        // línea recta provisoria mientras se calcula la ruta real
        line = L.polyline([[originPt.lat,originPt.lng],[destPt.lat,destPt.lng]], { color:'#4b7bff', weight:2, dashArray:'2 8', opacity:.6 }).addTo(map);
      }
    }

    async function drawRealRoute(){
      if(!originPt || !destPt) return;
      const route = await fetchRealRoute(originPt.lat, originPt.lng, destPt.lat, destPt.lng);
      if(line){ map.removeLayer(line); line = null; }
      if(route){
        line = L.polyline(route.coords, { color:'#4b7bff', weight:4, opacity:.85 }).addTo(map);
        onUpdate({ stage:'route-real', km: route.km, minutes: route.minutes });
      } else {
        line = L.polyline([[originPt.lat,originPt.lng],[destPt.lat,destPt.lng]], { color:'#4b7bff', weight:2, dashArray:'2 8', opacity:.7 }).addTo(map);
        onUpdate({ stage:'route-fallback' });
      }
    }

    async function setOrigin(lat, lng, isGPS){
      originPt = L.latLng(lat, lng);
      if(originMarker) map.removeLayer(originMarker);
      originMarker = L.marker(originPt, {icon:pinIcon(false, isGPS)}).addTo(map);
      map.setView(originPt, 15);
      onUpdate({ stage:'origin-set' });
      const address = await reverseGeocode(lat, lng);
      onUpdate({ stage:'origin-address', address, lat, lng, isGPS });
      if(destPt) drawRealRoute();
    }

    async function setDest(lat, lng){
      destPt = L.latLng(lat, lng);
      if(destMarker) map.removeLayer(destMarker);
      destMarker = L.marker(destPt, {icon:pinIcon(true)}).addTo(map);
      redrawLine();
      onUpdate({ stage:'dest-set' });
      const address = await reverseGeocode(lat, lng);
      onUpdate({ stage:'dest-address', address, lat, lng });
      map.fitBounds([[originPt.lat,originPt.lng],[destPt.lat,destPt.lng]], {padding:[40,40]});
      drawRealRoute();
    }

    map.on('click', (e) => {
      if(!originPt) setOrigin(e.latlng.lat, e.latlng.lng, false);
      else if(!destPt) setDest(e.latlng.lat, e.latlng.lng);
    });

    function tryLocateMe(){
      if(!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude } = pos.coords;
          if(inCaba(latitude, longitude)){
            setOrigin(latitude, longitude, true);
          } else {
            onUpdate({ stage:'out-of-caba' });
          }
        },
        () => { /* permiso denegado o falló: sigue el flujo manual con toques */ },
        { enableHighAccuracy:true, timeout:6000 }
      );
    }

    // Al abrir el mapa, intenta ubicarte automático (como Uber)
    tryLocateMe();

    return {
      reset(){
        if(originMarker){ map.removeLayer(originMarker); originMarker=null; }
        if(destMarker){ map.removeLayer(destMarker); destMarker=null; }
        if(line){ map.removeLayer(line); line=null; }
        originPt = null; destPt = null;
        map.setView(CABA_CENTER, 12);
        onUpdate({ stage:'reset' });
      },
      locateMe: tryLocateMe,
      setOriginByCoords: (lat,lng) => setOrigin(lat, lng, false),
      setDestByCoords: (lat,lng) => setDest(lat, lng),
      hasOrigin: () => !!originPt,
      invalidate(){ setTimeout(()=> map.invalidateSize(), 80); }
    };
  }

  // Mapa de solo lectura para mostrar un viaje ya cargado (con lat/lng guardados)
  const CAR_SVG = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 16.5V12.8c0-.4.13-.79.38-1.1L6.6 9.3c.28-.35.7-.55 1.15-.55h8.5c.45 0 .87.2 1.15.55l1.72 2.4c.25.31.38.7.38 1.1v3.7" stroke="#0c0c0e" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="16.5" width="18" height="3" rx="1.2" stroke="#0c0c0e" stroke-width="1.6"/><circle cx="7" cy="19.5" r="1.4" fill="#0c0c0e"/><circle cx="17" cy="19.5" r="1.4" fill="#0c0c0e"/><path d="M6.8 12.2h10.4" stroke="#0c0c0e" stroke-width="1.6" stroke-linecap="round"/></svg>`;

  function carIcon(){
    return L.divIcon({ className:'', html:`<div class="car-pin-wrap"><div class="ring"></div><div class="ring"></div><div class="core">${CAR_SVG}</div></div>`, iconSize:[32,32], iconAnchor:[16,16] });
  }

  function initStaticMap(containerId, pLat, pLng, dLat, dLng, driverLat, driverLng){
    const map = makeBaseMap(containerId, false);
    const pts = [];
    if(pLat && pLng){ L.marker([pLat,pLng], {icon:pinIcon(false)}).addTo(map); pts.push([pLat,pLng]); }
    if(dLat && dLng){ L.marker([dLat,dLng], {icon:pinIcon(true)}).addTo(map); pts.push([dLat,dLng]); }
    if(pLat && pLng && dLat && dLng){
      const straightLine = L.polyline([[pLat,pLng],[dLat,dLng]], { color:'#4b7bff', weight:2, dashArray:'2 8', opacity:.6 }).addTo(map);
      fetchRealRoute(pLat, pLng, dLat, dLng).then(route => {
        if(route){
          map.removeLayer(straightLine);
          L.polyline(route.coords, { color:'#4b7bff', weight:4, opacity:.85 }).addTo(map);
        }
      });
    }
    if(driverLat && driverLng){
      L.marker([driverLat,driverLng], {icon:carIcon()}).addTo(map);
      pts.push([driverLat,driverLng]);
    }
    if(pts.length >= 2){
      map.fitBounds(pts, {padding:[30,30]});
    } else if(pts.length === 1){
      map.setView(pts[0], 14);
    }
    setTimeout(()=> map.invalidateSize(), 80);
    return map;
  }

  function renderDirectoryList(drivers){
    const el = document.getElementById('directoryList');
    if(!el) return;
    if(drivers.length === 0){

      return;
    }
    const order = {disponible:0, reservado:1, ocupado:2, offline:3};
    const sorted = [...drivers].sort((a,b) => (order[a.status]??9) - (order[b.status]??9));
    const statusLabel = {disponible:'Disponible', reservado:'Reservado', ocupado:'Ocupado', offline:'Fuera de línea'};

    el.innerHTML = sorted.map(d => `
      <div class="card driverListCard">

          }
        </div>
      </div>
    `).join('');

    sorted.forEach(d => {
      getDriverRatingSummary(d.id).then(summary => {
        const el2 = document.getElementById('rating-'+d.id);
        if(!el2) return;
        el2.innerHTML = summary ? ratingBadgeHtml(summary.avg, summary.count) : 'Sin calificaciones aún';

    el.querySelectorAll('button[data-pick]').forEach(btn => {
      btn.onclick = () => {

          id: btn.dataset.pick, name: btn.dataset.name,
          brand: btn.dataset.brand, model: btn.dataset.model,

        if(directoryChannel){ supa.removeChannel(directoryChannel); directoryChannel = null; }
        session.role = 'pasajero';
        render();
      };
    });
  }

      const confirmBox = document.getElementById('confirmBox');
      const priceWrap = document.getElementById('priceCardWrap');
      if(originData && destData){
        confirmBox.classList.add('show');
        const usingReal = routeKm !== null;
        const km = usingReal ? routeKm : distanceKm(originData.lat, originData.lng, destData.lat, destData.lng);
        let fare = estimateFare(km);
        const isPrivate = !!session.targetDriver;
        if(isPrivate) fare = Math.round(fare * VIP_SURCHARGE_MULTIPLIER / 50)*50;
        session._estimatedFare = fare;
        session._estimatedKm = km;
        const serviceFee = estimateServiceFee(km);
        session._serviceFee = serviceFee;
        const feeDisplay = document.getElementById('serviceFeeDisplay');
        if(feeDisplay) feeDisplay.textContent = money(serviceFee);
        priceWrap.innerHTML = `
          <div class="card" style="border-color:var(--accent-dim);">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div>
                <div style="font-size:11px;color:var(--text-faint);text-transform:uppercase;font-weight:700;letter-spacing:.3px;">Precio estimado${isPrivate ? ' · Privado 🌟' : ''}</div>
                <div style="font-size:12px;color:var(--text-dim);margin-top:2px;">${km.toFixed(1)} km ${usingReal ? 'por calles' : '(calculando ruta real...)'}${routeMinutes ? ' · ~'+Math.round(routeMinutes)+' min' : ''}</div>
              </div>
              <div style="font-size:24px;font-weight:700;">${money(fare)}</div>
            </div>
            ${isPrivate ? `<div style="font-size:10.5px;color:var(--gold);margin-top:8px;">Incluye recargo por pedido privado a conductor elegido (+25%)</div>` : ''}
            <div style="font-size:10.5px;color:var(--text-faint);margin-top:8px;border-top:1px solid var(--border);padding-top:8px;">${currentUsdRateLabel || 'Consultando cotización...'}</div>
          </div>
        `;
      } else {
        confirmBox.classList.remove('show');
        priceWrap.innerHTML = '';
      }
    }

    const picker = initPickerMap('pickerMap', (evt) => {
      try{
        const hint = document.getElementById('mapStatusText');
        const searchOriginEl = document.getElementById('searchOrigin');
        const searchDestEl = document.getElementById('searchDest');
        if(evt.stage === 'origin-set' && hint) hint.textContent = 'Ahora tocá el mapa o escribí el destino';
        if(evt.stage === 'origin-address'){
          originData = { address: evt.address, lat: evt.lat, lng: evt.lng };
          if(searchOriginEl) searchOriginEl.value = evt.address;
          if(evt.isGPS && hint) hint.textContent = 'Esa es tu ubicación · marcá el destino';
          refreshRouteStripUI();
        }
        if(evt.stage === 'dest-set' && hint) hint.textContent = 'Calculando la ruta real...';
        if(evt.stage === 'dest-address'){
          destData = { address: evt.address, lat: evt.lat, lng: evt.lng };
          if(searchDestEl) searchDestEl.value = evt.address;
          refreshRouteStripUI();
        }
        if(evt.stage === 'route-real'){ routeKm = evt.km; routeMinutes = evt.minutes; if(hint) hint.textContent = 'Listo, confirmá abajo'; refreshRouteStripUI(); }
        if(evt.stage === 'route-fallback' && hint) hint.textContent = 'Listo, confirmá abajo (ruta aproximada)';
        if(evt.stage === 'out-of-caba' && hint) hint.textContent = 'Estás fuera del área de cobertura, marcá tu origen manualmente';
        if(evt.stage === 'reset'){
          originData = null; destData = null; routeKm = null; routeMinutes = null;
          if(searchOriginEl) searchOriginEl.value = '';
          if(searchDestEl) searchDestEl.value = '';
          if(hint) hint.textContent = '';
          refreshRouteStripUI();
        }
      } catch(e){ console.warn('Error actualizando el mapa (no debería frenar el resto):', e); }
    });
    picker.invalidate();

    document.getElementById('mapResetBtn').onclick = () => picker.reset();
    document.getElementById('locateBtn').onclick = () => {
      document.getElementById('mapStatusText').textContent = 'Buscando tu ubicación...';
      picker.locateMe();
    };

    async function searchAndSet(query, isOrigin){
      if(!query.trim()) return;
      const hint = document.getElementById('mapStatusText');
      hint.textContent = 'Buscando "' + query + '"...';
      const result = await forwardGeocode(query);
      if(!result){ hint.textContent = 'No encontré esa dirección, probá con otro texto'; return; }
      if(isOrigin) picker.setOriginByCoords(result.lat, result.lng);
      else picker.setDestByCoords(result.lat, result.lng);
    }
    document.getElementById('btnSearchOrigin').onclick = () => searchAndSet(document.getElementById('searchOrigin').value, true);
    document.getElementById('btnSearchDest').onclick = () => searchAndSet(document.getElementById('searchDest').value, false);

    // Listado de sugerencias en vivo (tipo autocompletar) mientras escribís
    function setupAddressAutocomplete(inputId, suggestId, isOrigin){
      const input = document.getElementById(inputId);
      const box = document.getElementById(suggestId);
      let debounceTimer = null;
      input.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        const q = input.value.trim();
        if(q.length < 4){ box.classList.add('hidden'); box.innerHTML = ''; return; }
        debounceTimer = setTimeout(async () => {
          const results = await forwardGeocodeList(q);
          if(results.length === 0){ box.classList.add('hidden'); box.innerHTML = ''; return; }
          box.innerHTML = results.map((r,i) => `<div class="addressSuggestItem" data-idx="${i}">${escapeHtml(r.label)}</div>`).join('');
          box.classList.remove('hidden');
          box.querySelectorAll('.addressSuggestItem').forEach(item => {
            item.onclick = () => {
              const r = results[parseInt(item.dataset.idx)];
              input.value = r.label;
              box.classList.add('hidden');
              box.innerHTML = '';
              if(isOrigin) picker.setOriginByCoords(r.lat, r.lng);
              else picker.setDestByCoords(r.lat, r.lng);
            };
          });
        }, 450);
      });
      input.addEventListener('keydown', e => {
        if(e.key === 'Enter'){ box.classList.add('hidden'); searchAndSet(input.value, isOrigin); }
      });
    }
    setupAddressAutocomplete('searchOrigin', 'suggestOrigin', true);
    setupAddressAutocomplete('searchDest', 'suggestDest', false);

    document.querySelectorAll('#depositMethodGroup .segOpt').forEach(el => {
      el.onclick = () => {
        document.querySelectorAll('#depositMethodGroup .segOpt').forEach(o=>o.classList.remove('active'));
        el.classList.add('active');
        depositMethod = el.dataset.val;
      };
    });

    async function submitRideRequest(){
      const name = session.passengerName;
      const phone = session.passengerPhone;
      const deposit = parseFloat(document.getElementById('pDeposit').value) || 0;
      const scheduledVal = document.getElementById('pScheduled').value;

      if(!name || !originData || !destData){
        alert('Marcá origen y destino en el mapa (o buscalos escribiendo la dirección).');
        return false;
      }
      if(timing === 'programado' && !scheduledVal){
        alert('Elegí la fecha y hora del viaje programado.');
        return false;
      }
      if(!supa || SUPABASE_ANON_KEY === 'PONE_ACA_TU_ANON_KEY'){
        alert('Falta configurar la anon key de Supabase en el código.');
        return false;
      }

      const { data, error } = await supa.from('rides').insert({
        passenger_name: name,
        passenger_phone: phone,
        passenger_photo_url: session.passengerPhoto || null,
        pickup: originData.address, dropoff: destData.address,
        pickup_lat: originData.lat, pickup_lng: originData.lng,
        dropoff_lat: destData.lat, dropoff_lng: destData.lng,
        deposit_amount: deposit,
        deposit_method: depositMethod,
        service_fee: session._serviceFee || SERVICE_FEE_BASE,
        estimated_fare: session._estimatedFare || null,
        distance_km: session._estimatedKm || null,
        scheduled_at: timing === 'programado' ? new Date(scheduledVal).toISOString() : null,
        driver_id: session.targetDriver ? session.targetDriver.id : null,
        is_private: !!session.targetDriver,
        status: 'pendiente'
      }).select().single();

      if(error){ alert('No se pudo pedir el viaje: ' + error.message); return false; }

      session.targetDriver = null;
      session.activeRideId = data.id;
      render();
      return true;
    }
    setupSlideToAction('confirmRideTrack', 'confirmRideThumb', 'confirmRideLabel',
      'Deslizá para confirmar y pedir', '¡Listo, pidiendo!', submitRideRequest);
  }

  let trackMap = null, trackMarkers = { origin:null, dest:null, driver:null }, trackRouteDrawn = false;

  function renderPassengerTracking(){
    trackMap = null; trackMarkers = { origin:null, dest:null, driver:null }; trackRouteDrawn = false;
    stageContent.innerHTML = `<div id="statusHeroWrap"></div>`;
    main.innerHTML = `
      <div class="backLink" id="cancelBack">← cancelar y volver</div>
      <div id="statusPillArea"></div>

        <div id="routeStripArea"></div>

      </div>

  function updateTrackMap(ride){
    const container = document.getElementById('trackMap');
    if(!container) return;

    // Primera vez: creo el mapa, marco origen/destino y trazo la ruta real UNA sola vez
    if(!trackMap && ride.pickup_lat && ride.pickup_lng){
      trackMap = makeBaseMap('trackMap', false);
      trackMarkers.origin = L.marker([ride.pickup_lat, ride.pickup_lng], {icon:pinIcon(false)}).addTo(trackMap);
      if(ride.dropoff_lat && ride.dropoff_lng){
        trackMarkers.dest = L.marker([ride.dropoff_lat, ride.dropoff_lng], {icon:pinIcon(true)}).addTo(trackMap);
        const straight = L.polyline([[ride.pickup_lat,ride.pickup_lng],[ride.dropoff_lat,ride.dropoff_lng]], { color:'#4b7bff', weight:2, dashArray:'2 8', opacity:.6 }).addTo(trackMap);
        trackMap.fitBounds([[ride.pickup_lat,ride.pickup_lng],[ride.dropoff_lat,ride.dropoff_lng]], {padding:[30,30]});
        fetchRealRoute(ride.pickup_lat, ride.pickup_lng, ride.dropoff_lat, ride.dropoff_lng).then(route => {
          if(route && trackMap){
            trackMap.removeLayer(straight);
            L.polyline(route.coords, { color:'#4b7bff', weight:4, opacity:.85 }).addTo(trackMap);
          }
        });
      } else {
        trackMap.setView([ride.pickup_lat, ride.pickup_lng], 14);
      }
      setTimeout(()=> trackMap && trackMap.invalidateSize(), 80);
    }

    // El auto: se crea una vez y de ahí en más solo se MUEVE, nunca se recrea el mapa
    if(trackMap && ride.driver_lat && ride.driver_lng){
      if(!trackMarkers.driver){
        trackMarkers.driver = L.marker([ride.driver_lat, ride.driver_lng], {icon:carIcon()}).addTo(trackMap);
        const el = trackMarkers.driver.getElement();
        if(el) el.style.transition = 'transform 1.1s linear';
      } else {
        trackMarkers.driver.setLatLng([ride.driver_lat, ride.driver_lng]);
      }
    }
  }

    const statusMeta = {

    }

    statusPillArea.innerHTML = `
      <span class="statusPill ${ride.status}">${ride.status === 'pendiente' ? '<span class="dotBlink"></span>' : ''}${statusMeta.pill}</span>
      ${ride.scheduled_at ? `<span class="statusPill aceptado" style="margin-left:6px;">🗓 ${new Date(ride.scheduled_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>` : ''}
    `;

    routeStripArea.innerHTML = routeStrip(ride.pickup, ride.dropoff);

    feeArea.innerHTML = `
      <div class="goldBadge">💰 Seña ${money(ride.deposit_amount)} · ${ride.deposit_method}</div>
      <div style="font-size:11.5px;color:var(--text-faint);margin-top:8px;">+ cargo de servicio ${money(ride.service_fee || 0)}</div>
      ${ride.estimated_fare ? `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);"><span style="font-size:12.5px;color:var(--text-dim);">Precio estimado del viaje</span><span style="font-size:17px;font-weight:700;">${money(ride.estimated_fare)}</span></div>` : ''}

        <div class="card">
          <div class="who">
            ${avatarHtml(ride.driver_name, ride.driver_photo_url)}
            <div>
              <div class="whoName">${escapeHtml(ride.driver_name)}</div>
              <div id="driverRatingArea" style="margin:2px 0;font-size:12px;color:var(--text-faint);">cargando estrellas...</div>
              <div class="carMeta">
                ${colorDot(ride.driver_color)}
                <span class="carMetaText">${escapeHtml(ride.driver_brand||'')} ${escapeHtml(ride.driver_model||'')}</span>
                ${plateBadge(ride.driver_plate, true)}
              </div>
            </div>
          </div>
          ${ride.driver_car_photo_url ? `<img src="${ride.driver_car_photo_url}" alt="Auto del conductor" style="width:100%;border-radius:12px;margin-bottom:12px;max-height:160px;object-fit:cover;">` : ''}
          ${ride.driver_mp_alias ? `
            <div class="mpAliasCard">
              <div style="flex:1;">
                <div class="mpLogoBadge"><span class="mpDot">$</span><span class="mpMercado">mercado</span><span class="mpPago">pago</span></div>
                <div style="font-size:15px;font-weight:700;">${escapeHtml(ride.driver_mp_alias)}</div>
                <div style="font-size:10.5px;color:var(--text-faint);margin-top:2px;">${ride.driver_mp_qr_photo_url ? 'Escaneá este QR para transferir' : 'Transferí a este alias (sin QR de pago cargado)'}</div>
              </div>
              ${ride.driver_mp_qr_photo_url ? `
                <div class="mpQrWrap"><img src="${ride.driver_mp_qr_photo_url}" alt="QR real de MercadoPago" style="width:76px;height:76px;display:block;object-fit:contain;"></div>
              ` : ''}
            </div>
          ` : ''}
          <button class="btn secondary" id="openChatBtn">💬 Mensaje al conductor</button>
        </div>
      `;
      const chatBtn = document.getElementById('openChatBtn');
      if(chatBtn) chatBtn.onclick = () => renderChatScreen(ride.id, 'pasajero', ride.driver_name);
      if(ride.driver_id){

          const el = document.getElementById('driverRatingArea');
          if(!el) return;
          el.innerHTML = summary ? ratingBadgeHtml(summary.avg, summary.count) : 'Todavía sin calificaciones';
        });

    } else if(isPrivatePending && ride.driver_id){
      // Todavía no aceptó, pero como es pedido privado ya sabemos a quién le pedimos: lo mostramos igual
      driverInfoArea.innerHTML = `<div class="card"><div class="empty">Cargando datos de tu conductor elegido...</div></div>`;
      supa.from('drivers').select('*').eq('id', ride.driver_id).maybeSingle().then(({data:d}) => {

          if(!el) return;

    extraArea.innerHTML = `
      ${ride.status === 'pendiente' ? `
        <div class="card" style="border-color:var(--accent-dim);">

          <button class="btn secondary" id="simulateBtn">${isPrivatePending ? 'Simular que confirma' : 'Simular conductor de prueba'}</button>

      ${ride.status === 'completado' ? renderRatingBlock(ride) : ''}

    if(simBtn) simBtn.onclick = () => {
      simBtn.disabled = true;
      simBtn.textContent = 'Simulando...';
      simulateDriverArrival(ride);
    };

    if(ride.status === 'completado'){
      vibrate([20,40,20,40,60]);
      const btn = document.getElementById('newRideBtn');
      if(btn) btn.onclick = () => { unsubscribeRide(); session.activeRideId = null; render(); };

      let selectedPayment = ride.final_payment_method || null;
      let selectedStarsGlobal = 0;

      function refreshButtonsEnabled(){
        const rateBtn = document.getElementById('submitRating');
        const payBtn = document.getElementById('confirmPaymentOnly');
        if(rateBtn) rateBtn.disabled = !(selectedStarsGlobal >= 1 && selectedPayment);
        if(payBtn) payBtn.disabled = !selectedPayment;
      }

      const paymentGroup = document.getElementById('finalPaymentGroup');
      if(paymentGroup){
        paymentGroup.querySelectorAll('.segOpt').forEach(el => {
          el.onclick = () => {
            paymentGroup.querySelectorAll('.segOpt').forEach(o=>o.classList.remove('active'));

            selectedPayment = el.dataset.val;
            refreshButtonsEnabled();
          };
        });

      if(!ride.rating){
        const stars = document.querySelectorAll('.starBtn');
        stars.forEach(s => {
          s.onclick = () => {
            selectedStarsGlobal = parseInt(s.dataset.star);
            stars.forEach(x => x.classList.toggle('filled', parseInt(x.dataset.star) <= selectedStarsGlobal));
            refreshButtonsEnabled();
          };
        });
        const submitBtn = document.getElementById('submitRating');
        if(submitBtn) submitBtn.onclick = async () => {
          if(selectedStarsGlobal < 1) return;
          const update = { rating: selectedStarsGlobal };
          if(selectedPayment) update.final_payment_method = selectedPayment;
          await supa.from('rides').update(update).eq('id', ride.id);
          vibrate([15,30,15,30,50]);
          loadRideOnce(ride.id, renderRideStatusCard);
        };
      } else {
        const payBtn = document.getElementById('confirmPaymentOnly');
        if(payBtn) payBtn.onclick = async () => {
          if(!selectedPayment) return;
          await supa.from('rides').update({ final_payment_method: selectedPayment }).eq('id', ride.id);
          vibrate(20);
          loadRideOnce(ride.id, renderRideStatusCard);
        };
      }
    }
    if(ride.status === 'aceptado'){
      vibrate([15,50,15]);
    }
  }

  }

  // Mueve un punto lat/lng un paso hacia otro (interpolación lineal simple)
  function lerpPoint(fromLat, fromLng, toLat, toLng, t){
    return { lat: fromLat + (toLat-fromLat)*t, lng: fromLng + (toLng-fromLng)*t };
  }

  // MODO PRUEBA: simula un conductor real aceptando y viajando, para probar solo sin una segunda persona
  async function simulateDriverArrival(ride){
    if(!supa) return;
    // Elijo un conductor de prueba: el que ya tenía asignado (pedido directo) o uno disponible al azar
    let driver = null;
    if(ride.driver_id){
      const { data } = await supa.from('drivers').select('*').eq('id', ride.driver_id).maybeSingle();
      driver = data;
    }
    if(!driver){
      const { data } = await supa.from('drivers').select('*').eq('status','disponible').limit(10);
      if(data && data.length) driver = data[Math.floor(Math.random()*data.length)];
    }
    if(!driver){
      alert('No hay conductores de prueba disponibles. Corré el seed de 20 choferes en Supabase primero.');
      return;
    }

    // Punto de partida simulado: un poco lejos del origen, dentro de CABA
    const startLat = ride.pickup_lat + (Math.random()-0.5)*0.03;
    const startLng = ride.pickup_lng + (Math.random()-0.5)*0.03;

    await supa.from('rides').update({
      status: 'aceptado',
      driver_id: driver.id,
      driver_name: driver.name,
      driver_phone: driver.phone,
      driver_brand: driver.brand,
      driver_model: driver.model,
      driver_plate: driver.plate,
      driver_color: driver.color,
      driver_photo_url: driver.photo_url,
      driver_car_photo_url: driver.car_photo_url,
      driver_mp_alias: driver.mp_alias,
      driver_mp_qr_photo_url: driver.mp_qr_photo_url,
      driver_lat: startLat,
      driver_lng: startLng,
      updated_at: new Date().toISOString()
    }).eq('id', ride.id);
    await supa.from('drivers').update({status:'reservado'}).eq('id', driver.id);

    // Tramo 1: viene desde startLat/Lng hasta el origen (pickup), siguiendo calles reales si se puede
    await animateAlongRealRoute(ride.id, startLat, startLng, ride.pickup_lat, ride.pickup_lng, 12000);

    await supa.from('rides').update({ status:'en_curso', updated_at:new Date().toISOString() }).eq('id', ride.id);
    await supa.from('drivers').update({status:'ocupado'}).eq('id', driver.id);

    // Tramo 2: del origen al destino, siguiendo calles reales si se puede
    await animateAlongRealRoute(ride.id, ride.pickup_lat, ride.pickup_lng, ride.dropoff_lat, ride.dropoff_lng, 18000);

    await supa.from('rides').update({ status:'completado', updated_at:new Date().toISOString() }).eq('id', ride.id);
    await supa.from('drivers').update({status:'disponible'}).eq('id', driver.id);
  }

  // Anima al auto siguiendo los puntos reales de la ruta (calles). Si no consigue la ruta real, cae a línea recta.
  async function animateAlongRealRoute(rideId, fromLat, fromLng, toLat, toLng, durationMs){
    const route = await fetchRealRoute(fromLat, fromLng, toLat, toLng);
    const path = (route && route.coords && route.coords.length > 1) ? route.coords : [[fromLat,fromLng],[toLat,toLng]];
    const totalSteps = Math.max(10, Math.round(durationMs / 1100));
    for(let i=0; i<=totalSteps; i++){
      const t = i/totalSteps;
      const idxFloat = t * (path.length - 1);
      const idx = Math.floor(idxFloat);
      const frac = idxFloat - idx;
      const p1 = path[idx];
      const p2 = path[Math.min(idx+1, path.length-1)];
      const lat = p1[0] + (p2[0]-p1[0])*frac;
      const lng = p1[1] + (p2[1]-p1[1])*frac;
      await supa.from('rides').update({ driver_lat:lat, driver_lng:lng }).eq('id', rideId);
      if(i < totalSteps) await new Promise(r => setTimeout(r, durationMs/totalSteps));
    }
  }

  function animateDriverAlong(rideId, fromLat, fromLng, toLat, toLng, durationMs){
    return new Promise(resolve => {
      const steps = Math.max(8, Math.round(durationMs / 1100)); // un paso cada ~1.1s, igual a la transición CSS
      let step = 0;
      const interval = setInterval(async () => {
        step++;
        const t = step / steps;
        const p = lerpPoint(fromLat, fromLng, toLat, toLng, Math.min(t,1));
        await supa.from('rides').update({ driver_lat:p.lat, driver_lng:p.lng }).eq('id', rideId);
        if(step >= steps){
          clearInterval(interval);
          resolve();
        }
      }, durationMs/steps);
    });
  }

  // Partículas doradas flotando sobre un banner (efecto decorativo, liviano en CSS)
  function spawnParticles(containerId, count){
    const layer = document.getElementById(containerId);
    if(!layer) return;
    const colors = ['#d7b56d', '#4b7bff', '#f2f2ee'];
    layer.innerHTML = '';
    for(let i=0; i<count; i++){
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 2 + Math.random()*4;
      const left = Math.random()*100;
      const duration = 4 + Math.random()*4;
      const delay = Math.random()*6;
      const drift = (Math.random()*40-20).toFixed(0) + 'px';
      const color = colors[Math.floor(Math.random()*colors.length)];
      p.style.left = left + '%';
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.background = color;
      p.style.boxShadow = `0 0 ${size*2}px ${color}`;
      p.style.setProperty('--drift', drift);
      p.style.animationDuration = duration + 's';
      p.style.animationDelay = delay + 's';
      layer.appendChild(p);
    }
  }
