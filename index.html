    const statusLabel = {disponible:'Disponible', reservado:'Reservado', ocupado:'Ocupado', offline:'Fuera de línea'}[session.driverStatus] || session.driverStatus;
    const canToggle = !session.activeRideId; // reservado/ocupado se manejan solos con el viaje, no a mano
    const isOn = session.driverStatus === 'disponible';

    main.innerHTML = `
      <div class="availCard" style="margin-bottom:10px;">
        <div class="availText">
          <div class="ledDot ${session.driverStatus}"></div>
          <div class="availLabel">${statusLabel}</div>
        </div>
      </div>
      <div class="connectWrap">
        <div class="connectTrack ${isOn ? 'on' : 'off'}" id="connectTrack" style="${canToggle ? '' : 'opacity:.5;pointer-events:none;'}">
          <div class="connectLabel" id="connectLabel">${isOn ? 'Deslizá para desconectarte' : 'Deslizá para conectarte y trabajar'}</div>
          <div class="connectThumb" id="connectThumb">${isOn ? '✓' : '🚗'}</div>
        </div>
      </div>
      <div class="todayStatsRow" id="todayStatsRow">
        <div class="todayStat"><div class="todayStatVal" id="statTripsToday">···</div><div class="todayStatLabel">Viajes hoy</div></div>
        <div class="todayStat"><div class="todayStatVal" id="statEarnedToday">···</div><div class="todayStatLabel">Ganado hoy</div></div>
        <div class="todayStat"><div class="todayStatVal" id="statRatingMini">···</div><div class="todayStatLabel">Calificación</div></div>
      </div>
      <div id="driverContent"></div>
    `;
    setupConnectSlider(isOn, canToggle);
    renderDriverContent();
    subscribeToPendingRides();
    loadTodayStats();
  }

  async function loadTodayStats(){
    if(!supa || !session.driverId) return;
    const todayStart = new Date(); todayStart.setHours(0,0,0,0);
    const { data } = await supa.from('rides').select('estimated_fare, rating').eq('driver_id', session.driverId).eq('status','completado').gte('created_at', todayStart.toISOString());
    const trips = data ? data.length : 0;
    const earned = data ? data.reduce((s,r)=>s+(r.estimated_fare||0),0) : 0;
    const tripsEl = document.getElementById('statTripsToday');
    const earnedEl = document.getElementById('statEarnedToday');
    if(tripsEl) tripsEl.textContent = trips;
    if(earnedEl) earnedEl.textContent = money(earned);
    const summary = await getDriverRatingSummary(session.driverId);
    const ratingEl = document.getElementById('statRatingMini');
    if(ratingEl) ratingEl.textContent = summary ? '★ '+summary.avg.toFixed(1) : '—';
  }

  // Slider genérico de una sola dirección: deslizás hasta el final y dispara una acción (con async/validación)
  function setupSlideToAction(trackId, thumbId, labelId, idleText, successText, actionFn){
    const track = document.getElementById(trackId);
    const thumb = document.getElementById(thumbId);
    const label = document.getElementById(labelId);
    if(!track || !thumb) return;

    let dragging = false, startX = 0, moved = 0;
    function thumbMax(){ return track.clientWidth - 60; }
    function setThumbPos(px){ thumb.style.left = Math.max(4, Math.min(thumbMax(), px)) + 'px'; }

    thumb.addEventListener('pointerdown', (e) => {
      dragging = true; moved = 0;
      thumb.classList.add('dragging');
      thumb.setPointerCapture(e.pointerId);
      startX = e.clientX;
    });
    thumb.addEventListener('pointermove', (e) => {
      if(!dragging) return;
      moved = Math.abs(e.clientX - startX);
      setThumbPos(4 + (e.clientX - startX));
    });
    thumb.addEventListener('pointerup', async () => {
      if(!dragging) return;
      dragging = false;
      thumb.classList.remove('dragging');
      const currentLeft = parseFloat(thumb.style.left || 4);
      if(currentLeft > thumbMax()*0.55){
        setThumbPos(thumbMax());
        track.classList.add('on'); track.classList.remove('off');
        if(label) label.textContent = successText;
        const ok = await actionFn();
        if(ok === false){ setThumbPos(4); track.classList.remove('on'); track.classList.add('off'); if(label) label.textContent = idleText; }
      } else {
        setThumbPos(4);
      }
    });
  }

  function setupConnectSlider(isOn, canToggle){
    const track = document.getElementById('connectTrack');
    const thumb = document.getElementById('connectThumb');
    if(!track || !thumb || !canToggle) return;

    let dragging = false, startX = 0, thumbStartLeft = 0, moved = 0;

    function thumbMax(){ return track.clientWidth - 60; } // 56px thumb + 4px padding

    function setThumbPos(px){
      const clamped = Math.max(4, Math.min(thumbMax(), px));
      thumb.style.left = clamped + 'px';
    }

    thumb.addEventListener('pointerdown', (e) => {
      dragging = true;
      moved = 0;
      thumb.classList.add('dragging');
      thumb.setPointerCapture(e.pointerId);
      startX = e.clientX;
      thumbStartLeft = isOn ? thumbMax() : 4;
    });

    thumb.addEventListener('pointermove', (e) => {
      if(!dragging) return;
      moved = Math.abs(e.clientX - startX);
      setThumbPos(thumbStartLeft + (e.clientX - startX));
    });

    thumb.addEventListener('pointerup', async (e) => {
      if(!dragging) return;
      dragging = false;
      thumb.classList.remove('dragging');
      const currentLeft = parseFloat(thumb.style.left || (isOn ? thumbMax() : 4));
      const goOn = moved < 6 ? !isOn : (currentLeft > thumbMax()/2);
      await commitConnect(goOn);
    });

    // click directo en el riel (sin arrastrar) también funciona
    track.addEventListener('click', (e) => {
      if(e.target === thumb) return;
      commitConnect(!isOn);
    });
  }

  async function commitConnect(goOn){
    const newStatus = goOn ? 'disponible' : 'offline';
    session.driverStatus = newStatus;
    vibrate(goOn ? [15,40,15] : 25);
    await supa.from('drivers').update({status:newStatus, updated_at:new Date().toISOString()}).eq('id', session.driverId);
    render();
  }

  let driverActiveMap = null, driverActiveMarkers = { origin:null, dest:null, driver:null };
  let driverRideChannel = null;

  function renderDriverContent(){
    const el = document.getElementById('driverContent');
    if(!el) return;

    if(session.activeRideId){
      driverActiveMap = null; driverActiveMarkers = { origin:null, dest:null, driver:null };
      el.innerHTML = `
        <div class="card rideCard">
          <div id="driverStatusArea"></div>
          <div id="driverWhoArea"></div>
          <div class="mapWrap"><div class="mapStatic" id="driverTrackMap" style="height:320px;"></div></div>
          <div id="driverRouteArea"></div>
          <div id="driverFeeArea"></div>
          <button class="btn secondary" id="openChatBtnDriver" style="margin-top:10px;">💬 Mensaje al pasajero</button>
          <div id="driverActionArea"></div>
        </div>
      `;
      if(driverRideChannel){ supa.removeChannel(driverRideChannel); driverRideChannel = null; }
      driverRideChannel = supa.channel('driver-ride-'+session.activeRideId)
        .on('postgres_changes', { event:'UPDATE', schema:'public', table:'rides', filter:`id=eq.${session.activeRideId}` }, (payload) => {
          renderDriverActiveRide(payload.new);
        })
        .subscribe();
      loadRideOnce(session.activeRideId, renderDriverActiveRide);
      return;
    }

    if(driverRideChannel){ supa.removeChannel(driverRideChannel); driverRideChannel = null; }

    if(session.driverStatus !== 'disponible'){
      el.innerHTML = `<div class="empty">Ponete "Disponible" para ver pedidos de viaje.</div>`;
      return;
    }

    el.innerHTML = `<div class="sectionLabel">Pedidos cerca tuyo</div><div id="pendingList"><div class="empty">Buscando pedidos...</div></div>`;
    loadPendingRides();
  }

  function updateDriverActiveMap(ride){
    const container = document.getElementById('driverTrackMap');
    if(!container) return;

    if(!driverActiveMap && ride.pickup_lat && ride.pickup_lng){
      driverActiveMap = makeBaseMap('driverTrackMap', false);
      driverActiveMarkers.origin = L.marker([ride.pickup_lat, ride.pickup_lng], {icon:pinIcon(false)}).addTo(driverActiveMap);
      if(ride.dropoff_lat && ride.dropoff_lng){
        driverActiveMarkers.dest = L.marker([ride.dropoff_lat, ride.dropoff_lng], {icon:pinIcon(true)}).addTo(driverActiveMap);
        const straight = L.polyline([[ride.pickup_lat,ride.pickup_lng],[ride.dropoff_lat,ride.dropoff_lng]], { color:'#4b7bff', weight:2, dashArray:'2 8', opacity:.6 }).addTo(driverActiveMap);
        driverActiveMap.fitBounds([[ride.pickup_lat,ride.pickup_lng],[ride.dropoff_lat,ride.dropoff_lng]], {padding:[30,30]});
        fetchRealRoute(ride.pickup_lat, ride.pickup_lng, ride.dropoff_lat, ride.dropoff_lng).then(route => {
          if(route && driverActiveMap){
            driverActiveMap.removeLayer(straight);
            L.polyline(route.coords, { color:'#4b7bff', weight:4, opacity:.85 }).addTo(driverActiveMap);
          }
        });
      } else {
        driverActiveMap.setView([ride.pickup_lat, ride.pickup_lng], 14);
      }
      setTimeout(()=> driverActiveMap && driverActiveMap.invalidateSize(), 80);
    }

    if(driverActiveMap && ride.driver_lat && ride.driver_lng){
      if(!driverActiveMarkers.driver){
        driverActiveMarkers.driver = L.marker([ride.driver_lat, ride.driver_lng], {icon:carIcon()}).addTo(driverActiveMap);
        const elDot = driverActiveMarkers.driver.getElement();
        if(elDot) elDot.style.transition = 'transform 1.1s linear';
      } else {
        driverActiveMarkers.driver.setLatLng([ride.driver_lat, ride.driver_lng]);
      }
    }
  }

  function renderDriverActiveRide(ride){
    if(!ride) return;
    const statusArea = document.getElementById('driverStatusArea');
    const whoArea = document.getElementById('driverWhoArea');
    const routeArea = document.getElementById('driverRouteArea');
    const feeArea = document.getElementById('driverFeeArea');
    const actionArea = document.getElementById('driverActionArea');
    if(!statusArea) return;

    const statusMeta = {
      aceptado:  { pill:'Andá a buscarlo/a' },
      en_curso:  { pill:'Viaje en curso' },
      completado:{ pill:'Viaje terminado' }
    }[ride.status] || { pill:ride.status };

    let actionBtn = '';
    if(ride.status === 'aceptado'){
      actionBtn = `<button class="btn" id="pickupBtn">Ya lo/la recogí</button>`;
    } else if(ride.status === 'en_curso'){
      actionBtn = `<button class="btn success" id="finishBtn">Viaje terminado</button>`;
    }

    statusArea.innerHTML = `
      <span class="statusPill ${ride.status}">${statusMeta.pill}</span>
      ${ride.scheduled_at ? `<span class="statusPill aceptado" style="margin-left:6px;">🗓 ${new Date(ride.scheduled_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>` : ''}
    `;
    whoArea.innerHTML = `
      <div class="who">
        ${avatarHtml(ride.passenger_name, ride.passenger_photo_url)}
        <div>
          <div class="whoName">${escapeHtml(ride.passenger_name)}</div>
          ${ride.passenger_phone ? `<div class="whoSub">${escapeHtml(ride.passenger_phone)}</div>` : ''}
        </div>
      </div>
    `;
    routeArea.innerHTML = routeStrip(ride.pickup, ride.dropoff);
    feeArea.innerHTML = `
      <div class="goldBadge">💰 Seña ${money(ride.deposit_amount)} · ${ride.deposit_method}</div>
      <div style="font-size:11.5px;color:var(--text-faint);margin-top:8px;">El pasajero paga aparte un cargo de servicio de ${money(ride.service_fee || 0)} (no es para vos, es de la app)</div>
      ${ride.estimated_fare ? `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);"><span style="font-size:12.5px;color:var(--text-dim);">Precio estimado del viaje</span><span style="font-size:17px;font-weight:700;">${money(ride.estimated_fare)}</span></div>` : ''}
    `;
    actionArea.innerHTML = actionBtn;

    updateDriverActiveMap(ride);

    const chatBtnDriver = document.getElementById('openChatBtnDriver');
    if(chatBtnDriver) chatBtnDriver.onclick = () => renderChatScreen(ride.id, 'conductor', ride.passenger_name);

    const pickupBtn = document.getElementById('pickupBtn');
    if(pickupBtn) pickupBtn.onclick = async () => {
      await supa.from('rides').update({status:'en_curso', updated_at:new Date().toISOString()}).eq('id', ride.id);
      await supa.from('drivers').update({status:'ocupado'}).eq('id', session.driverId);
      session.driverStatus = 'ocupado';
      loadRideOnce(ride.id, renderDriverActiveRide);
    };
    const finishBtn = document.getElementById('finishBtn');
    if(finishBtn) finishBtn.onclick = async () => {
      await supa.from('rides').update({status:'completado', updated_at:new Date().toISOString()}).eq('id', ride.id);
      await supa.from('drivers').update({status:'disponible'}).eq('id', session.driverId);
      session.driverStatus = 'disponible';
      session.activeRideId = null;
      stopDriverLocationSharing();
      vibrate([20,30,20,30,50]);
      render();
    };
  }

  async function loadPendingRides(){
    if(!supa) return;
    const { data, error } = await supa.from('rides').select('*').eq('status','pendiente').order('created_at', {ascending:true});
    if(error){ console.warn(error); return; }
    // Solo pedidos abiertos (sin conductor asignado) o dirigidos directamente a mí
    const mine = (data || []).filter(r => !r.driver_id || r.driver_id === session.driverId);
    renderPendingList(mine);
  }

  function renderPendingList(rides){
    const el = document.getElementById('pendingList');
    if(!el) return;
    if(rides.length === 0){
      el.innerHTML = `<div class="empty">No hay pedidos pendientes por ahora.</div>`;
      return;
    }
    el.innerHTML = rides.map(r => {
      const isDirect = !!r.driver_id;
      const isScheduled = !!r.scheduled_at;
      const scheduledLabel = isScheduled ? new Date(r.scheduled_at).toLocaleString('es-AR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : null;
      return `
      <div class="card rideCard">
        <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;">
          ${isDirect ? '<span class="statusPill reservado">Pedido directo</span>' : ''}
          ${isScheduled ? `<span class="statusPill aceptado">🗓 ${scheduledLabel}</span>` : '<span class="statusPill disponible">🚨 Urgente</span>'}
        </div>
        <div class="who">
          ${avatarHtml(r.passenger_name, r.passenger_photo_url)}
          <div class="whoName">${escapeHtml(r.passenger_name)}</div>
        </div>
        ${routeStrip(r.pickup, r.dropoff)}
        <div class="goldBadge">💰 Seña ${money(r.deposit_amount)} · ${r.deposit_method}</div>
        ${r.estimated_fare ? `<div style="font-size:12.5px;color:var(--text-dim);margin-top:6px;">Viaje estimado: <b style="color:var(--text);">${money(r.estimated_fare)}</b> (${(r.distance_km||0).toFixed(1)} km)</div>` : ''}
        <button class="btn success" data-ride="${r.id}" style="margin-top:14px;">Aceptar viaje</button>
      </div>
    `;
    }).join('');
    el.querySelectorAll('button[data-ride]').forEach(btn => {
      btn.onclick = () => acceptRide(btn.dataset.ride);
    });
  }

  async function acceptRide(rideId){
    const { data, error } = await supa.from('rides').update({
      status: 'aceptado',
      driver_id: session.driverId,
      driver_name: session.driverName,
      driver_phone: session.driverPhone,
      driver_brand: session.driverBrand,
      driver_model: session.driverModel,
      driver_plate: session.driverPlate,
      driver_color: session.driverColor,
      driver_photo_url: session.driverPhoto,
      driver_car_photo_url: session.driverCarPhoto,
      driver_mp_alias: session.driverMpAlias,
      driver_mp_qr_photo_url: session.driverMpQrPhoto,
      updated_at: new Date().toISOString()
    }).eq('id', rideId).eq('status','pendiente').select().single();

    if(error || !data){ alert('Ese viaje ya lo tomó otro conductor.'); loadPendingRides(); return; }

    await supa.from('drivers').update({status:'reservado'}).eq('id', session.driverId);
    session.driverStatus = 'reservado';
    session.activeRideId = rideId;
    vibrate([20,40,20]);
    startDriverLocationSharing(rideId);
    render();
  }

  // Comparte la ubicación real del conductor mientras viene a buscar / está llevando
  function startDriverLocationSharing(rideId){
    stopDriverLocationSharing();
    if(!navigator.geolocation) return;
    geoWatchId = navigator.geolocation.watchPosition(
      (pos) => {
        const now = Date.now();
        if(now - lastGeoSend < 4000) return; // cada 4 seg como mucho
        lastGeoSend = now;
        supa.from('rides').update({
          driver_lat: pos.coords.latitude,
          driver_lng: pos.coords.longitude
        }).eq('id', rideId).then(()=>{});
      },
      (err) => console.warn('geo watch error', err),
      { enableHighAccuracy:true, maximumAge:3000 }
    );
  }

  function stopDriverLocationSharing(){
    if(geoWatchId !== null && navigator.geolocation){
      navigator.geolocation.clearWatch(geoWatchId);
      geoWatchId = null;
    }
  }


  // ================= DATA HELPERS =================
  async function loadRideOnce(rideId, cb){
    if(!supa || !rideId) return;
    const { data, error } = await supa.from('rides').select('*').eq('id', rideId).single();
    if(error){ console.warn(error); return; }
    cb(data);
  }

  function subscribeToRide(rideId, cb){
    unsubscribeRide();
    ridesChannel = supa.channel('ride-' + rideId)
      .on('postgres_changes', { event:'UPDATE', schema:'public', table:'rides', filter:`id=eq.${rideId}` }, payload => {
        cb(payload.new);
      })
      .subscribe();
  }

  function unsubscribeRide(){
    if(ridesChannel){ supa.removeChannel(ridesChannel); ridesChannel = null; }
  }

  function subscribeToPendingRides(){
    if(driversChannel){ supa.removeChannel(driversChannel); driversChannel = null; }
    driversChannel = supa.channel('pending-rides')
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'rides' }, (payload) => {
        const ride = payload.new;
        if(ride.status !== 'pendiente') return;
        const isForMe = ride.driver_id === session.driverId; // pedido privado dirigido a mí
        const isOpenPool = !ride.driver_id && session.driverStatus === 'disponible'; // pedido abierto y estoy conectado
        if(isForMe || isOpenPool){
          showUrgentRequestOverlay(ride, isForMe);
        }
      })
      .on('postgres_changes', { event:'*', schema:'public', table:'rides' }, () => {
        if(!session.activeRideId && session.driverStatus === 'disponible'){
          loadPendingRides();
        }
      })
      .subscribe();
  }

  // Aviso urgente pantalla completa para CUALQUIER pedido nuevo (privado o abierto) mientras estás conectado (como Uber)
  function showUrgentRequestOverlay(ride, isPrivate){
    if(session.activeRideId) return; // ya tiene un viaje activo, no lo interrumpo
    if(session.driverStatus !== 'disponible' && !isPrivate) return; // si no está disponible, solo interrumpe si es privado directo
    const existing = document.getElementById('urgentOverlay');
    if(existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.id = 'urgentOverlay';
    overlay.className = 'urgentOverlay';
    const km = ride.distance_km ? ride.distance_km.toFixed(1) : null;
    overlay.innerHTML = `
      <div class="urgentCard">
        <div class="urgentBadge">${isPrivate ? '🌟 PEDIDO PRIVADO' : '🚕 NUEVO PEDIDO'}</div>
        <div class="urgentTimer" id="urgentTimer">20</div>
        ${avatarHtml(ride.passenger_name, ride.passenger_photo_url)}
        <div class="urgentName">${escapeHtml(ride.passenger_name)}</div>
        <div class="mapWrap" style="margin:12px 0;"><div class="mapStatic" id="urgentMap" style="height:170px;"></div></div>
        ${routeStrip(ride.pickup, ride.dropoff)}
        <div class="goldBadge">💰 Seña ${money(ride.deposit_amount)} · ${ride.deposit_method}</div>
        <div style="display:flex;justify-content:center;gap:16px;margin-top:10px;">
          ${km ? `<div style="font-size:13px;color:var(--text-dim);">📏 ${km} km</div>` : ''}
          ${ride.estimated_fare ? `<div style="font-size:15px;font-weight:700;">${money(ride.estimated_fare)}</div>` : ''}
        </div>
        <div style="display:flex;gap:10px;margin-top:20px;">
          <button class="btn danger" id="declineUrgent" style="flex:1;">Rechazar</button>
          <button class="btn success" id="acceptUrgent" style="flex:1;">Aceptar</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    vibrate([30,80,30,80,30]);

    const mapEl = document.getElementById('urgentMap');
    if(mapEl && ride.pickup_lat && ride.pickup_lng){
      initStaticMap('urgentMap', ride.pickup_lat, ride.pickup_lng, ride.dropoff_lat, ride.dropoff_lng);
    }

    let secondsLeft = 20;
    const timerEl = document.getElementById('urgentTimer');
    const countdown = setInterval(() => {
      secondsLeft--;
      if(timerEl) timerEl.textContent = secondsLeft;
      if(secondsLeft <= 0){
        clearInterval(countdown);
        overlay.remove();
      }
    }, 1000);

    document.getElementById('declineUrgent').onclick = () => {
      clearInterval(countdown);
      overlay.remove();
    };
    document.getElementById('acceptUrgent').onclick = async () => {
      clearInterval(countdown);
      overlay.remove();
      await acceptRide(ride.id);
    };
  }

  // ================= INIT =================
  if(supa && SUPABASE_ANON_KEY !== 'PONE_ACA_TU_ANON_KEY'){
    connBadge.textContent = 'conectado';
    connBadge.className = 'connPill ok';
  } else {
    connBadge.textContent = 'falta config';
    connBadge.className = 'connPill warn';
  }

  async function boot(){
    fetchDolarRate(); // no bloquea el arranque, se actualiza en segundo plano
    const remembered = supa ? getRememberedAccount() : null;
    if(remembered && remembered.role === 'conductor'){
      const { data } = await supa.from('drivers').select('*').eq('phone', remembered.phone).maybeSingle();
      if(data){
        session.role = 'conductor';
        session.driverId = data.id;
        session.driverName = data.name;
        session.driverPhone = data.phone;
        session.driverBrand = data.brand;
        session.driverModel = data.model;
        session.driverColor = data.color;
        session.driverPlate = data.plate;
        session.driverPhoto = data.photo_url;
        session.driverCarPhoto = data.car_photo_url;
        session.driverMpAlias = data.mp_alias;
        session.driverMpQrPhoto = data.mp_qr_photo_url;
        session.driverStatus = data.status;
        return render();
      }
    } else if(remembered && remembered.role === 'pasajero'){
      const { data } = await supa.from('passengers').select('*').eq('phone', remembered.phone).maybeSingle();
      if(data){
        session.role = 'pasajero';
        session.passengerName = data.name;
        session.passengerPhone = data.phone;
        session.passengerPhoto = data.photo_url;
        return render();
      }
    }
    render();
  }
  // Deslizar desde el borde izquierdo hacia la derecha = volver (como en iOS)
  (function setupSwipeBack(){
    let startX = null;
    const appEl = document.getElementById('app');
    appEl.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
    appEl.addEventListener('touchend', e => {
      if(startX === null) return;
      const endX = e.changedTouches[0].clientX;
      if(startX < 40 && (endX - startX) > 80){
        const backBtn = document.getElementById('back');
        if(backBtn) backBtn.click();
      }
      startX = null;
    }, {passive:true});
  })();

  boot();
})();
</script>
